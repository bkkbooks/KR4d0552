body:
  text: 聞過齊集卷四元吳海撰記讀書室記樂清潘氏有讀書之室藍君仲晦為書其扁且介以來求豫文曰願有以教之豫不敏竊惟天地人物之理君臣父子之義齊家治國平天下之道正心修巳之法莫不昭然具在於書必讀之而后有以識事理之當然以成已成物而不謬自古及今英賢豪傑之士未有不由此者卜夏言未學吾必謂之學君子以為過季路言何必讀書聖人惡其佞顧書不可不讀而讀之固當有法蓋不讀非聖之書則異端邪說不得以亂吾之聰明而志定慮專無他岐之惑諷誦習熟循序漸進則無欲速不達舍近取逺之病優游涵泳沈潛玩索則不徒口耳而有自得之實朝夕孶孶無有間斷則溫故知新而有日進之益驟覺勿喜小得勿足則人百已千而有必成之效嗟夫去聖既逺遺經徒存師道不立斯文殆墜間有讀書者不啻如空谷之跫音也抑不知其立心何如也如以義則為己也以利則為人也為己者自一話一言莫非切已心存而默識身體而力行極其至也雖聖可幾也為人則不過資辨博富詞翰以耀世俗媒取利祿而已於心身何有焉故豫嘗病夫人之不讀書而設心以利者又不若不讀之愈也今潘生築室以讀書名固豫所甚喜又不逺千里來徵言逾年而愈勤則其志之不在利亦可知矣故道之如此俾朝夕省焉庶幾進德之助遊上林記豫舊至章山聞西六七里許有上林之勝北十數里許有鴈湖之竒欲遊之久而不果乙卯冬末豫與王侯用文以弔事至林嶼遂約翌日登鴈湖已具而主人有遽不得偕往因興敗而王侯猶力獨邀豫至上林侯先往遣僕夫以兜子來迎由林嶼行二里許至郭家店川明谷豁雞犬數家時村民方蒔麥兒童狎走來往野婦緝道上牛羊牧其前藹然墟落之趣沿壑里許乃躋石磴並麓田折左為畬右為林木稍進而夷踈竹數竿老梅抱石立灌莽吐十餘花淡然若自娛者歷數折負崦一二人家髙爽幽寂門戶盡閉益使人蕭然有出塵之想自是以往夾徑皆修篁晴日篩光微風成韻又入深林䕃鬱里許表曰白馬峯蓋佛寺在焉地勢回環屋宇宏麗輝􅝉奪目而豫行亦倦矣遂憩卧雲軒寺僧焚香煮茗來供故翰林林公潮守王侯諸名人詩具刻在壁余亦寫詩軒中僧又設酒肴延客甚勤乃登寺山周流盤桓或籍草木或坐盤石長吟舒嘯興至隨量而飲望髙林斜照紫翠如染觀僧引泉自别壑釃之注佛殿下為沼以植芙蕖沼中溢出右山之足轉經前山復入為池旁引泉入齊厨下之以激機舂然後遍行蔬畦間以資灌溉既又復歸於池以出而泉亦勞矣是夕宿軒中附火至夜深乃睡雖猿聲澗響足山中之景而鐘鼓磬鐸之音鏗訇鞺􅝅不為落莫寺僧再請登鴈湖黎明北風大作寒不可禦鴈湖在望而不能即信一遊覽亦莫不有數焉又輟以俟他日姑記上林之遊如此重遊鼓山記歲柔兆執徐吳子客居董下出門面鼓山惟限一水自初秋即約數人同登既而七月中雨八月中又雨約重九重九復雨閏月雨不止所與約諸人咸以事違然豫意獨勤念過此則冬氣將厲寒不能登矣十月十一日風定無雲里中陳垣士周彭琅德彌吳泉孝升三人皆舍遽相從凌晨渡江自蓬隑入荔林依山右行暾旭宇霽道旁野花炫耀黃碧色霜林葉如染采山果可噉澗中泉韻琮琤鳥聲啽哢飛來近人若相娛二里許至岐路乃絶壑橫度小石杠遇數人家復有岐路路當右有少年坐石上紿曰左乃左行由屋後隮石蹬﨑嶇險峻近二里所達路寄衣舄寺中升數岡則篁竹深密不可尋路有徑趨山右並崖而進雖覺異然意可得達遂循之里許值窮見水源而返蓋寺中引泉處也退而披篁刋木剪伐椔翳登樹而望向髙直上攀緣蹭蹬三里許然後榛莽之中略有微蹊可辨衆共喜進五六百步果至峰頂人不勝其勞憩息良久尊酌屢行然後徐起徘徊瞻眺意既適則又樂而忘罷矣訪豫曩年宿處荒穢特甚不可以前下山日將暮月已升東不能復覽洞中諸勝出近南寺得村氓引導暝黑穿林中歷畬田指示詳悉乃乘月度嶺上下緣麥隴中取道抵灰隑喚舟從西岸來濟及家將二鼓矣是遊雖不能從容若疇昔然然於世故沈困憔悴無聊之中得一日之暇以紓憂釋慮將亦不易得耳復憶十數年前城中倪林二子屢嘗欲登以不得豫偕而止者五六遂終身不能登今豫屢登而二子在泉不可作矣因忽感念涕泗為零二子倪則桂德芳林則琦公偉也春暉閣記東林生熊飾小閣於室之西以為奉親之所且取孟郊詩語名之曰春暉閣直正南啓戶見山花卉果實雜蒔於其前春明景熙草木萌長蟲蜚鳥哢物各生遂薰風日長語燕相呼槐深桞密靜若無暑郊原入秋穹宇朗清梧桐炫金楓葉如染賔鴈來翔嘒嘒蟬吟明月當軒爽氣近人霜雪既降檜柏青青背隂向陽南陸出晷朔吹不及迎暄抱燠四時之景變於外而閣中常若陽春焉阿㜷起居優游宴息雍容含飴弄孫子婦承顔左右娛侍天下之樂孰有加此者哉昔阿㜷持家理生勤儉勞苦奉身不越禮度教子嚴而有方待宗族克正而睦馭婢僕肅而恩故內外無間言而家裕業進熊也遂克至於成人今阿㜷年逾七十康寧强健子孝婦順諸孫嶄然殆天所以報阿㜷生登斯閣而視斯扁思鞠育顧復之仁教誨作成之義知其年而深喜且懼焉瀡滫甘㫖之供必竭其力怡愈和柔之奉必盡其誠愛日之情不能自已猶不足以報其萬一夫春陽育物不自以為恩故其恩不讎親之慈子不自以為德故其德無極古人以是為喻蓋反求而自得於心者傳曰孝弟至林木茂孝之生福也如此而移風易俗善莫大焉生其勉之既為之記又為之賦東林六章章四句東林有木其木維檜雪霜屢驕其葉肺肺東林有木其木維柏其枝翹翹其葉滌滌東林有烏粲粲其羽聿飛遄臻言返其哺淑人有淑恭儉維德天監厥美賚之遐福其福謂何有婦有子亦有令孫曰母是似煦煦春暉油油草心勉爾順思懷我好音遺安堂記濟南林貢父才茂而學富能晏以自守至正之末官爵猥濫閭巷小兒市一資半級以炫耀鄰里貢父於時方且課僮奴力耕抱盎灌畦勸之仕不應既衆勸之則取龎德公遺安之言揭於堂然後勸者始息世運變遷攘攘之徒競進以希新寵曽未數歲禽獮草夷蓋萬一有全者人始服貢父之髙貢父將求豫言因友人林玊請數年矣辭弗獲乃為記之豫惟安之義廣矣德公之言一端而已矣夫莫安於理理出於天而具於人心物必有則事必有宜大而民生倫紀之間細而日用動靜之際吉凶榮辱之兩途利害失得之前陳必也審擇而處之順理則安逆理為危危者棄而安者即雖至顛沛不易況造次乎若世有道則仕無道則隱進將施利澤於人退以避禍難於已其出處固自有宜非獨以退為安仕即為危也子向之所處亦既得其安矣今吾將語子以大安之道孟子云仁人之安宅也義人之正路也禮人之大門也誠能得是宅以居由是門以出遵是路以行將見無在不安無入而不自得以是淑之身而教之子孫雖百世安可也所遺顧不甚逺且大矣乎嗟夫景升以荆州之全畀其子後世曽不得芘其闔閭以居世之惑者往往纍金玉恨其不多廣田宅畏其不厚與子孫交手相付旋踵而失之且禍逮焉然則非其無所遺也遺之不以安而以危也觀子之名堂亦可以少戒矣為之銘曰事物之理各有當然人之置身亦猶器焉失平則傾失正則反不反不傾乃得其安於皇昊穹降此民德視聼飲食咸具爾則子焉克孝父焉克慈有子靡疾堂基播菑兄愛弟敬因心友于既翕既好無交相愈男正乎外女正乎內閨門雍雍燕及童孺言必忠信巧紿取憎行必篤敬蠻貊可行孰不欲富得之以義孰不欲貴取之有道决身以叨終乃賈禍曰貧與賤人曷不堪在分已定天胡可貪順命守素荼苦茹甘我思古人心安於理苟得聞道曰斃可矣凡百君子念之敬之雞鳴而起為善孜孜人亦有言無念爾祖貽厥孫謀以燕翼子我銘於堂譬彼書紳善慎爾遺遺於後人南樓記樓以髙明為主而面南特勝髙則可以眺逺南則向明而於四時之氣無不宜藍田陳氏所居右闢一樓以為遊憩之所凡賔客之來必居是而扁未有刻以質於豫豫曰既南矣謂之南樓不亦可乎主人曰吾子幸有以教之豫曰古人之制宫室必面南而背北所以順隂陽適寒暑而通平氣也若是樓之景當星鳥之殷辰攬萬彚之萌鬯東疇土膏披襏襫而事耒耜者鱗然於其上君子契之則有務本勤力及時不怠之思焉大火正中炎熛灼人薰風時來煩慍俱滌視修途峻嶺行者往來役役君子達之則有知止自足安分無求之思焉天髙日晶秋風憀栗草木黃落羣隂斂揫君子感之則知屈信進退之義焉天地閉塞泉涸澤堅居人窒向蟄蟲墐户君子體之則知掩身儉德之戒焉是樓於人豈小助耶若夫輕煙暖霏晴嵐宿靄和氣動蕩景色洋溢月明而萬谷銀涵雪積而羣峯玊麗霧雨濛迷若扁舟之凌巨澥四時朝夕晴雨明晦而是樓之景可喜可愕可賞可愜子之兄弟羣從子姓相與逍遙於其間以游神騁目遣懷適興而暇日以娛嘉賔㑹親友談今論古觴酌賦詩彈琴投壺穆清風之可挹無俗塵之汚人則於斯樓實為宜稱而是樓之所以合天時總地宜善人事者曷一而不備數抑其視元龍百尺為何如主人兄弟囅爾而笑奉觴而進請書以為記集芳堂記乾坤清淑之氣萃於人者為賢俊其萃於物也鳥則為鵷鸞鳯凰獸則為麒麟騶虞其萃於草木也木則為松為檜為楩柟豫章草則為蘭為薰為蕙為茝為杜衡薜芷夫人之與物物之有是數種其類雖不同然皆善也故善人之所好亦必從其善焉乃若昔人正則之於蘭淵明之於菊周子之於蓮林逋之於梅千載之下觀於所愛而得其為人焉聖人有言與善人居如入芝蘭之室與惡人居如入鮑魚之肆則交遊之於人益不輕矣今楊生之堂所植無非嘉木竒卉林懷之又以集芳名之觀其所好如是則其所與交遊必無匪人者楊生必欲求豫言懷之為之請益堅吾將引而進之夫屈陶周林四君子者其貞節雅操令德髙志皆人之所素仰所愛草木亦因四賢而得名今楊生之於衆芳誠知其美而好之不徒為耳目之玩求其實反之於身而資以成德則亦無愧乎昔人之愛物矣其芝蘭玉樹産於庭階也曷疑豫雅愛懷之雖未知楊生因懷之固足以知之遂書以為集芳堂記心逺堂記東林林生請於豫曰昔先大父嘗營一堂以為燕休之所署其題曰心逺逮某則三世矣未有以發撝其㫖願先生之教之也豫曰子之大父以是名堂得無有取於陶淵明詩語乎曰然豫曰子之大父蓋賢而隱者也當元之中世民物方阜人有藝能術智者莫不輻集京師務以自售展其四體光大其業而子之大父乃能晦迹邱樊潛德弗耀薦書不名軺車不召栖遲偃仰於衡門之下教兒讀書課僮力耕與樵夫牧豎為伍茲其所以名堂之意蓋將獨善而與世相遺者也若子之父篤學好修親仁樂善於世事不關意鄉里稱為善人日惟與賢士大夫朋友談經講史商論古昔暇則詩酒優游若將終身焉者至於卒奪其志奔馳仕宦違其素願然其心未始異於淵明今子藉祖父之餘澤安分無求足以樂生抑豫重有告焉夫逺非徒髙舉長往遁世之謂也山不逺則不深視不逺則蔽於近慮不逺則有近憂道不逺則無所至田廬所以厚子孫也而守之未必能逺貨財所以裕子孫也而用之必當有盡子之祖宗傳世六百餘年以至於子吾意今日之存者皆其孝悌忠信慈惠謹實積纍之餘未必在乎區區田廬貨財而已吾所謂逺意蓋在乎此生乎勉之上承祖宗於既往下被子孫於無窮夙夜孜孜以是為心則其逺有出於陶言之外者生以為何如曰謹奉教遂書之宗㑹堂記羅田林氏舊為祠堂繇逺祖而下二十一世凡族人祧毁無後之主悉祠之其在子孫見祠者為二主以祔昭穆之次月朔望合族人致敬春秋卜日而祭於追逺之意可謂厚矣宣城貢祕書嘗為記之然豫竊有惑焉古者合祭祧毁之主於祖廟惟有國者得為之大夫不及也庶人薦於寢蓋用生者之禮先王之制豈得逾哉乃為正之使各瘞其羣主又為之次其逺祖以來世系名字具為一圖顯而易見冬至正旦陳於北牖宗子率族人羅拜堂下畢則撤圖布席宗子升坐於堂之東族長一人升坐於堂之西昆弟子姓以次成列序拜就坐獻壽設食勸酬禮終尊者稱述先代功德締造之勤積纍之厚子孫守成之不易覆墜之不難蚤夜修飭毋或不善以隳名辱身庶幾有以承祖宗之澤衍於來世用是為訓然後昆弟子姓各誦所聞或傳紀故事或近世賢者或鄉邑之人其善可為法惡可為戒者以復於尊以告於其衆族人有過則衆勸勉之期以必改族議既諧因更其名曰宗㑹之堂將以上章涒灘改歲行禮請豫志之以示將來豫惟舊日合祠之意蓋欲子孫不忘乎祖也今日宗㑹之意蓋欲子孫共仁其族也能仁其族乃所以能孝乎祖舊則自源而徂流今則循末而知本其禮雖殊意實不異夫人尊祖敬宗之念亦豈有窮哉顧禮制不可得為易之以圖則舊時之意不失而事得其宜豈不百世可行耶夫屬有親疏而族則一世有逺近而本則一仁人君子於其同類且一視之況同氣耶自夫一族之仁推之三族而益親行之十室而可化風俗之移亦且在是豫之所以必嚴宗子者欲族人知有所統先王之法雖不行毋亦存其名而已諸具貢公記者不復書愛日堂記人之生必本於父母故其行莫大於孝君子以父母俱存為樂而王天下不與焉則孝子仁人之愛其親可知己夫人之身必壯而後有子逮其子之長則身已衰矣逮其子之壯則身已老矣視聼不利於前舉動不便乎昔思慮不及於曩時食少而易飢膚劣而易寒也血氣之不足痾癢之相尋為之子者豈不思以安之顧時已邁矣衰者不可得而復壯老者不可得而還少雖三牲五鼎盡其養溫凊定省盡某禮洞洞屬屬盡其敬柔色婉容盡其愛左右無方盡其勤然往者不可及來者未可期而日不足矣雞鳴而起問其寢也視日之旦而憂其中既侍膳也視日之中而懼其昃將夕食也視日之暮惟畏其下蓋將以月為日而不足必將以歲為日而猶不足也歲且更矣念吾親之齒雖益一而來者益狹慕戀之情益切故視景而喜視隂而疑惟恐吾事親之日短於不可及者不得施焉此聖人所為喜懼者也若彭城董公瓚年甫壯以明經茂才舉司征來閩仕途發軔二親齒各未衰迎以就養子婦晨夕不離承顔順志幼孫學語於前一堂之中雅俞色笑有若春臺又題之以愛日其志抑可尚已夫父母俱存固人所樂而親年未艾尤不可得昔老萊子年七十奉二親為嬰兒之戲人亦孰不願為老萊者乎海自念不孝早為先人所棄不得奉杯水盂菽之歡今而既耄徒有終天之感視公瓚二親同享祿養此天之所以錫之者而人莫能及也古人有言惟德生福董氏之門其種德必厚不然何其獲福若是耶異時二親黃耉鮐背公瓚之年亦老矣庶幾有匹於老萊故誠為樂之既為之記又道以詩云瞻彼日矣其暉煌煌爰升于天耀于四方瞻彼日矣維暉融融耀于四方升恆于中人有父母或耆或耋我有父母鬒若𤣥髮人有父母或靡克具我則具矣曰亶有豫春陽熙熙淑景載遲草木具菲我親則怡夏之悠悠晷陸孔修薰風時來我親不憂秋日則杲冬日則燠則煦其寒亦解其肅南陔有蘭北牖有蓀厨有甘㫖以備饔飱崇我籩豆潔我罍爵父母既慶室家具樂溫溫淑人恪慎克孝天錫父母百歲難老人日不足爾日孔多善爾優游相爾作歌阜林鄉學記長樂邑南五十里海濵曰祉溪舊有鄉學宋英德府教授林垓子之所創也隘狹弗稱廢且百年其孫文溢謀於鄉族乃改卜地於溪之陽曰阜林建禮殿講堂左為列舍以肄諸生右為祠堂以崇先賢門庭邃幽廊廡周復庖湢完具道所出里人李麟築田為之地有闕里人林節生奉園足之庀工於洪武十二年冬而竣事於十三年春餘資為田十畝前有湖其菱魚之利入於學既成來徵記於郡人吳海海惟古先聖王化民之政莫重於學而學莫先於鄉自鄉以及閭巷莫不有師師教民孝弟忠信勤力務本民朝夕出入動作必稽善而奬之過而禁之故學校為育才之區而鄉閭實首教之地三代盛時其制若此治效安得不隆哉後世視為文具而俗不逮古國朝申嚴其法信謂知所務矣若文溢是舉不惟復三代之德而又廣前人之功於以教子弟而淑鄉人豫見其有成也抑豫將有告乎為師者夫自孟子沒而聖人之道不明異端權謀術數之言橫流於天下洋溢充斥千數百年不能止逮宋周程朱夫子出而繼往聖開來學三才若肇建焉今其遺書家傳人誦然而士大夫心術之微閭閻風俗之舊猶若未釋夫異端權謀術數之習者其故何哉聖賢之道著於書學者不能身體而力行徒以空言目之口耳相傳雖多無益顧學莫先於立志志既定然後即物以窮理存心而致知力行以求至惟日孜孜無少間斷則入道有方進德有序聖賢可馴致苟有一毫為利近名之心則非為己之學矣此愚所甚懼焉者願因諸君子謀之也日道成使海濵若洙泗諸君子之力也不肖願承下風致樂堂記瓜山陳璚名其堂曰致樂而求言於豫曰璚不幸三歲而失所恃惟是拊育顧復之恩皆出於父今父年且老不勝喜懼之情顧家貧無以具甘㫖之奉竊惟聖人之言所謂致其樂者欲孜孜焉蚤夜自勉冀獲少娛親之暮齒遂區區平昔之願願先生有以教之豫曰善乎爾之志也善乎爾之志也古之所謂能養者忠而已忠非有他盡其誠而已誠無有間於貧富也若使為子者必富而後可以致力於親則凡貧者皆將終身不得為孝乎昔者曾子曰孝子之養親也樂其心不違其志樂其耳目孟子曰啜菽飲水盡其歡如是而已矣夫養者為志也非徒為口體也溫凊定省之末節先後扶持之細務盛饌珍羞雖日進而愛敬不至與畜犬馬無異親亦何自而樂哉故人子之深愛者必有聲氣之和色容之婉視而見諸無形聽而察於無聲先意以承志奉順而不違不使其親少有所不樂於貧富奚擇哉蓋惟盡其心而無毫髮之僞則親必安親安則其心必樂心樂則子雖富亦樂雖貧亦樂三牲五鼎亦足樂疏食菜羮亦足樂終日欣然而忘其老此則所謂致樂也歟雖然是足謂養也未足為孝也不服暗登危以辱其身不苟訾苟笑而慢於人行道揚名以顯父母是則孝之大者不特致樂而已豫嘉生之有志故進而告之既為之記又贊以辭曰昔昌黎韓子作董生行謂董生召南其孝足稱暮歸讀書旦出耕事父母克樂天降休禎嗟哉斯人實維儀刑子尚繼之昭有令聲靜對樓記至正乙亥豫避寇水西依髙隑吳氏吳氏有小樓附麓面江平望數十里軒豁蕭灑地既癖人迹罕到户外有聞亦復不知歲戊申重來寓此於世事略不相接惟終日俯檻朝迎陽而夕待月夏延飇而冬賞雪溫涼寒暑晦明雨霽氣候變化千百各異潮汐之往來魚鳬之游飛犂鋤出入釣艇上下莫不事與心契境與情融豈徒忘世之兵革亦不知室之罄而身之羇也常讀書撫琴賦詩飲酒於此仰天宇之寥寥感今昔之殊時少壯不待老且益衰宜斯樓視吾為過客而天地一指亦何能長久不變哉蓋靜而觀之則固如是而已矣彼區區為名為利者終不能靜雞鳴而起汲汲孜孜攘攘嘻嘻憧憧伾伾若蚋若蠅逐臭與腥勞不知息死不暇悲視太華不見雷聲不聞則亦何怪其然耶是樓以靜名蓋主人深得其趣豫去之十載而不能忘其能忘情主人乎特書以記之逸興亭記逸興亭興不在乎亭也是亭博士先生李君之所作也先生慕聖賢之學服古人之道勢利弗趨而優游以為樂榮華弗羡而淡泊以自適蓋將脫凡近以游髙明與造物為徒而後為慊於其心也先生橫經講道之餘肄業董成之暇退諸生而罷賔客栖遲俯仰是亭之上雍容夷猶容與相羊境與情融興由趣發鳶飛魚躍灼乎道體之著風輕雲淡油然真樂之形庭草與吾意同碧山若儀刑對撫萬物以自得閲今古之往來髙懷獨詣遐思無窮衆人徒見先生之外而不知其內故先生之興超鴻濛而隘六合入風雲而軼埃壒者先生不言而人莫知惟是亭獨知之先生既不自欺又不欺人故道之於亭或者將即是亭而求先生之興則烏可將舍是亭而求先生之興亦烏可然則將若何求之而可曰子能學先生之學先生之道以得先生之樂則先生之興將不待求而盡悟之矣謂豫不信其質諸亭望雲亭記方氏兄弟構小亭於屋山之右以為游憩之所地既崇盡羅田之勝而覽之右嶺嶻嵲以龍趨左山騰踔而虎躍原田鱗次溪流虹委聚落林邱布棊列星周回十里不出闌楯之外朝日丹光射乎簷楹夜月清輝泛乎几席涼風滌炎雪白相映是亭於四時之景宜可謂備矣而未得其所以名暇日與豫登之指右山之盡而可見者曰雲窟吾曽大父之所藏也越左山之半而可見者曰雲居大父之塋在焉豫曰君是亭曷不名曰望雲昔狄梁公見白雲孤飛懷親舍而不忍去況子兩世松楸鬱然在目子之兄弟時時登覽於此賔客朋友宴集於此興適之餘舉首東盼曼眸西顧膚寸之起油然動心思吾身之所從來念祖宗創立之勤積纍之厚無非所以貽吾子孫者惕然內懼飭身厲行迪子訓孫孝弟忠信勤儉圖保之於無窮則斯亭之為益大矣豈徒遣懷縱目之樂而已哉方氏兄弟逌然謝曰命之矣遂書以記平逺堂記君子之澤厯世久而不窮者無非本諸其積慶之厚與其貽言之善而又有賢子孫克承之也具是三者於友人陳君子杞見之子杞之先由宋給事中以來十有餘世衣冠不墜詩禮相繼又三世為鄉先生其積可謂厚矣所居堂舊題平逺新構落成將仍揭之來告豫曰吾子幸有以啓我豫曰大哉夫天下之理惟平而已矣平則無傾無陂而可居可行可居可行乃可以逺洪範以無黨無偏為惟皇之極易以履道坦坦為幽人之貞詩不云乎民之秉彛好是懿德故父慈子孝夫正婦順兄友弟悌堯舜之道三代不能損益而詭節異行險怪邪僻君子不道焉君子平其心而已矣使心如衡而身如凖則施之家而理措之國而治放諸四海而不越傳諸萬世而可遵不亦逺之至乎夫平未有不逺者也不平未有能逺者也非其貽言之善乎漢陳仲弓平心率物而人自化若子杞之篤實好善自守不求於人淡然與物無忤誠可謂善承之者其視斯堂為無忝矣然世固有立德垂言而其澤不永者子孫不肖不能纘其緒也子杞之堂粵自今始又將愈久而不窮噫是堂之名豈獨於陳氏為宜凡登斯堂而覩斯名者皆不可以無警也碧玉潭記古靈多佳山水居人往往擇勝而面或挹竒峰秀壁或俯清流潺湲各因其志之所樂而得其趣以自適也若鄭生所寓則占乎溪流之滀而深者匯乎其止湛乎其澄膏乎其凝黛乎其停清徹淡滑泓涵晶瑩蓋淵乎其似道靜乎其若德故名之曰碧玉之潭焉吾嘗休於是潭之上陽光下臨雲影徘徊前山倒翠墮入潭底遊魚往來鬐脊可數聞磬咳聲劃然一散匿伏不可見良久然後出並岸密竹駢植幽草丰茸潭上老榕䕃可半畝輕風徐來舒疾成韻如聆絲簧二三友狎坐談笑俗塵不干清氣逼人襟懷為開煩慮消釋忘世故之紛拏與日月之促迫情融境暢幽意橫發不知濠梁之樂復能過是乃扣樹而歌之曰潭之清我濯我纓其碧晶晶伊玉之瑛又歌曰清潭汝池衡門栖遲洵美者子樂可忘饑於是諸君子咸屬而詩述豫言為記草心堂銘記有序天下有大恩而不能報者夫恩莫大於生之親之於子是也報莫大於稱之子於其親是也然則求其稱而不可得不知所以報之此人子之心所以惟日不足而不能自己乎世道淪胥人習悖德駢居誶語之風恬不為異見位達資多者衆羡愛慕專志孝弟者或鄙固之髙陽里潘德寧自幼失怙由母鞠育教誨爰底於成人德寧奉親愛敬家貧不能常具甘㫖遇有珍果竒味必懷以供母人多哂之而豫則深喜焉以豫不能及也載觀古人若考叔歸羮陸績懷橘不意茲事今日於生復見間謁豫曰德寧早棄於父賴母至今日深思厚恩其蔑云報將扁堂之北牖曰草心取孟貞躍詩語朝夕企以自朂先生其幸教之豫方愧生其何能辭夫言心之聲也因其言之泛切足以察其中之誠僞若生之孝吾乃信之為之詩以道其志云凡物之生實本乎天人之有身曰父母旃天何以報物則不克何以報親如天罔極春暉遲遲草乃生之勾萌甲坼敷秀榮滋春陽匪私草也至微至微有心亦懷報之鞠我育我長我畜我顧我復我出入腹我屏我烖害逺我水火自我能言教我誦詩我能步趨慎我威儀厲我儉勤毋我怠嬉我室我家亦百具宜莫恩匪深式深于淵莫德匪厚式髙于山匪天實天伊母則天草之於暉猶或思報矧伊人矣而不如草孟氏有言實獲我心草則不如奚間獸禽春陽載熙親顔載怡壺有清酒酌言壽之天監慈母錫之壽考錫以壽康錫以難老錫之百福亦淑我後北堂有萱菉竹猗猗孰登斯堂視我銘詩景山樓記陽隑卓子康好義人也故所遊多名士大夫若故潮守王公用文遭世變更屏居龍泉之上道出入往來必館焉獨以其舍近市囂不能愜每至必造其園坐荔隂俯清池徘徊徑中率以為常歲昭陽大淵獻子康之長子堅始即其地創小樓朴致幽雅明爽靚清可以坐可以卧可以企望以娛二親以聨弟昆延佳客後右有沼前南見山落成豫適至焉堅請曰不肖誤獲愛於王公先生所知也昔王公在時屢至此病室湫隘而斯樓未能創今既創念王公不復見矣堅父子每一登未嘗不感慨而不能忘願以斯意題斯樓也庶幾寫堅父子之夙心焉豫曰昔王公之室常對南山今子之樓亦且南向其南又亦有山詩不云乎髙山仰止景行行止以是名樓則子之意可具見矣嗟夫世俗日澆人之交不以勢則以利不以利則以勢以勢交者勢隆則附勢去則解以利交者利合則親利緩則弛勢利不可以長存故交情不能以久終惟義交者無勢利之去就無炎涼之聚散故久而愈敬沒而不能忘若王公之與子康交義也故沒而不忘非王公之髙誼無以起子康之慕非子康之好義亦必不懷王公然則是樓之名亦將使登者疑而問思而得其與人交必以義又推好義之心以應事接物使無往而不為義而不可勝用焉則髙山景行之思其有窮乎書以為是樓記近道齊記歲在昭陽豫寓苦竹聞章宗逺之賢其友方宗達言宗逺性至孝父嘗得痿疾卧十年宗逺蔬食亦十年晝夜坐卧床下宗逺於昆弟愛朋友敬慤實飭行人也去歲朝廷以禮幣徵授漳浦文學豫恨不及識他日其子隸來見恭而有禮敏而好直間抵其家至其讀書之室視楯間扁曰近道隸進曰大人嘗語隸吾平日廣求聞見知吾不足也見善必慕欲自勉也不善不敢為知吾恥也吾於道竊有志焉故取三近之㫖揭之以自警厲庶幾可得而入然大人夙慕先生未獲偕於左右先生幸臨其可無辭以誨豫謝不敏隸固曰大人向嘗得與孝度計偕敢藉是以請豫不得辭乃曰夫道者人倫日用事物當然之理乃天下古今人物共行之路道固因人而名也安得逺於人哉然惟踐形盡性者為能體其全其次氣稟有不齊是不能以皆盡必資學而後能其學者則又知有先後聞有蚤暮行有難易造有淺深其尤下者則必千百其功然學本於志必虛心克己而後能有受立志則好篤天下之物無以易之好篤則自力汲汲孜孜而無間斷乃能有進子卜子所謂博學而篤志切問而近思者乃為學之要道也愚也蚤自知學間亦有聞齒且耄矣猶覺其逺嘗懼不得為君子若宗逺固宜吾所觀善而取益者其敢有告乎獨以吾所自傷悼者誦焉宗逺其謂豫言然也者乎哉不然也者乎哉不然者願有以教也聞過齊集卷四
