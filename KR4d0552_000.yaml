body:
  text: 聞過齋集别集類四元提要臣等謹案聞過齋集八卷元吳海撰海字朝宗閩縣人至正末遭逢兵亂絶意仕進明洪武初守臣欲薦諸朝力辭得免既而徴詣史局亦力辭不赴事迹具明史隱逸傳是集為其門人王稱所編初海與永福王翰善元亡之後海以翰嘗仕元勸以死節而自撫其遺孤教之成立即稱是也史稱其文嚴整典雅一歸諸理又載海嘗言楊墨釋老聖道之賊管商申韓治道之賊稗官野乘史道之賊支詞艷説文章之賊上之人宜敕通經大臣會諸儒定其品目頒之天下民間非此不得輒藏坊肆不得輒鬻云云雖持論少俠非古人兼資博考之義然其宗旨之正亦于此可見矣其題曰聞過齋者海平生虛懷樂善有規過者欣然立改嘗以聞過名其齋稱因以名其集云乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部五聞過齋集目録别集類四元卷一敘吳氏世譜序厚本録序自試方題葬書敘雙谷敘送龍江書院山長敘美監郡編役敘贈劉僉憲卷後序贈醫師郭徽言序送林生赴延平學正敘贈閩縣學教諭序送王潮州敘贈順昌縣綜理官敘潘氏世譜敘送燕經歷入京敘王氏家譜序魯客序傅德謙復氏序孫氏二子名字敘送傅德謙還臨川敘梅花莊詩序卷二敘送徐宗度敘送程伯崇還江西敘送吳生序林氏宗譜題辭覺是文集敘新安吳氏家譜序楊徽字序吳氏家譜敘潘氏族譜敘送鄭訓導之古田敘魏氏支派圖敘卓氏家譜敘魏氏世譜敘林和字敘孫戣字敘薛懷安文集序送寧化訓導序思鳳臺詩並序薛氏家譜序卷三記祠堂記後記獨樂千古軒記改軒記淡軒記潮州三皇廟記遊鼓山記永思堂記慎德齋記烏稷堂記鄭公渡記種德堂記遊黃巖記悠然軒記友蘭軒記知止軒記歸帆樓記雲竹山房記東陽橋記卷四記讀書室記遊上林記重遊鼓山記春暉閣記遺安堂記南樓記集芳堂記心遠堂記宗會堂記愛日堂記阜林鄉學記致樂堂記靜對樓記逸興堂記望雲亭記平遠堂記碧玉堂記草心堂銘記景山樓記近道齋記卷五墓志銘行狀林彥中墓志銘林清源行狀韓公權厝志鄭維寶妻吳氏墓志故王將軍夫人孫氏墓志銘友石山人墓志銘元故翰林直學士林公墓志銘故前將樂縣典史林君墓志銘卷六書哀辭傳與林待制書别後答貢尚書復陳左丞書與使者書與秦景容書投鄭彥斌書黃孝仲哀辭林公偉哀辭阿彛哀辭王山人哀辭擬招友石先生傳閩寡婦傳卷七針銘題跋贊聞過齋針慎獨齋針慎獨針吳彝字針葉遲字針愚樂齋針惜陰齋針古鼎銘古劍銘石磬銘石巵銘孝經圖跋題風雨歸舟圖題醉圖題商山四皓圖題太公釣渭圖書三先生帖後醉道士圖跋題劉監丞海嶽圖題孫位畫馬融吹笛圖醉道士圖跋題鼬食瓜圖跋羅源黃氏所藏朱文公手帖跋藍仲晦三體千文題半方所宋少帝賜高應松辭參政不允詔後書書張原霆文集後琴贊混沌子贊逍遙道人真贊友石山人真贊直方贊薛子威真贊自贊卷八雜著祭文刊子朱子家禮成讀之有感書齋壁自警感春操木石居辭答問書禍書閩南集後書盧明安事後讀管子讀墨讀鬼谷子題念上人詩集朴存解書楊公遺稿後祭鄭氏甥女文諸妹哭羅氏姊文祭葉祺文祭鄭以宏文祭蘇善卿六丈文祭漳州知事史大年文祭陳氏女文雞心巒墓祭文聞過齋集原序文以道輕重自昔有是言也由古訖今其文之行後者莫不皆然舍道而論文則其人品之髙下何由而見哉夫言者心之聲而文又言之精者也心明乎道故其言皆可法昧乎道者反是是故理明而辭達文之上也理勝乎辭文之次也辭勝乎理不足謂之文矣況磔裂靡陋以趨時好者乎今觀閩中吳先生聞過齋集敘事嚴整議論正大雄健宏奧離合變化一歸於理非通經博古之精而信之篤養之有素何能致是韓子有云根之茂者其實邃膏之沃者其光曄仁義之人其言藹如也信然哉先生平生剛直終身隱約未嘗求知於人然非其人則亦莫能知也如尚書宣城貢公翰林學士晉安林公皆擅文名當世不易下人惟於先生者深加敬畏則其人品可知矣矧文章如良金美玉自有定價何待後世如揚子雲者出而後知耶先生沒逮今逾十五年是集藏於門人王稱家近吾友胡伯寧氏同知鹽運於閩見而喜之將於其同志建寧郡守芮君志文率好義之士為鋟諸梓以廣其傳間以公事道過鄉郡出以示余請序自顧老病昏塞安敢謂知言哉鄙野之辭不足軒輊姑書此以志景仰之私云歲在辛巳春正既望將仕佐郎前溫州府儒學教授永嘉徐起書
