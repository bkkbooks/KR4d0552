body:
  text: 聞過齋集别集類四元提要臣等謹案聞過齋集八卷元呉海撰海字朝宗閩縣人至正末遭逢兵亂絶意仕進明洪武初守臣欲薦諸朝力辭得免既而徴詣史局亦力辭不赴事迹具明史隠逸傳是集為其門人王偁所編初海與永福王翰善元亡之後海以翰嘗仕元勸以死節而自撫其遺孤教之成立即偁是也史稱其文嚴整典雅一歸諸理又載海嘗言楊墨釋老聖道之賊管商申韓治道之賊稗官野乗史道之賊支詞艷説文章之賊上之人宜勅通經大臣會諸儒定其品目頒之天下民間非此不得輒藏坊肆不得輒鬻云云雖持論少俠非古人兼資博攷之義然其宗㫖之正亦于此可見矣其題曰聞過齋者海平生虚懐樂善有規過者欣然立改嘗以聞過名其齋偁因以名其集云乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部五聞過齋集目錄别集類四元卷一叙吳氏世譜序厚本錄序自試方題葬書叙雙谷叙送龍江書院山長叙美監郡編役叙贈劉僉憲卷後序贈醫師郭徽言序送林生赴延平學正叙贈閩縣學教諭序送王潮州叙贈順昌縣綜理官叙潘氏世譜叙送燕經歴入京叙王氏家譜序魯客序傅德謙復氏序孫氏二子名字叙送傅德謙還臨川叙梅花莊詩序卷二叙送徐宗度叙送程伯崇還江西叙送吳生序林氏宗譜題辭覺是文集叙新安吳氏家譜序楊徽字序吳氏家譜叙潘氏族譜叙送鄭訓導之古田叙魏氏支派圖叙卓氏家譜叙魏氏世譜叙林和字叙孫戣字叙薛懷安文集序送寜化訓導序思鳳臺詩幷序薛氏家譜序卷三記祠堂記後記獨樂千古軒記改軒記淡軒記潮州三皇廟記游鼓山記永思堂記慎德齋記烏稷堂記鄭公渡記種德堂記游黄巖記悠然軒記友蘭軒記知止軒記歸帆樓記雲竹山房記東陽橋記卷四記讀書室記遊上林記重遊鼓山記春暉閣記遺安堂記南樓記集芳堂記心遠堂記宗㑹堂記愛日堂記阜林鄉學記致樂堂記靜對樓記逸興堂記望雲亭記平遠堂記碧玉堂記草心堂銘記景山樓記近道齋記卷五墓誌銘行狀林彦中墓誌銘林清源行狀韓公權厝誌鄭維寳妻吳氏墓誌故王將軍夫人孫氏墓誌銘友石山人墓誌銘元故翰林直學士林公墓誌銘故前將樂縣典史林君墓誌銘卷六書哀辭傳與林待制書别後答貢尚書復陳左丞書與使者書與秦景容書投鄭彦斌書黄孝仲哀辭林公偉哀辭阿彛哀辭王山人哀辭擬招友石先生傳閩寡婦傳卷七箴銘題跋賛聞過齋箴慎獨齋箴慎獨箴吳彝字箴葉遲字箴愚樂齋箴惜陰齋箴古鼎銘古劍銘石磬銘石巵銘孝經圖跋題風雨歸舟圖題醉圖題商山四皓圖題太公釣渭圖書三先生帖後醉道士圖跋題劉監丞海岳圖題孫位畫馬融吹笛圖醉道士圖跋題鼬食𤓰圖跋羅源黄氏所藏朱文公手帖跋藍仲晦三體千文題半方所宋少帝賜高應松辭㕘政不允詔後書書張原霆文集後琴賛混沌子賛逍遥道人真賛友石山人真賛直方賛薛子威真賛自賛卷八雜著祭文刊子朱子家禮成讀之有感書齋壁自儆感春操木石居辭答問書禍書閩南集後書盧明安事後讀管子讀墨讀鬼谷子題念上人詩集樸存解書楊公遺稿後祭鄭氏甥女文諸妹哭羅氏姊文祭葉祺文祭鄭以宏文祭蘇善卿六丈文祭漳州知事史大年文祭陳氏女文雞心巒墓祭文聞過齋集原序文以道輕重自昔有是言也由古訖今其文之行後者莫不皆然舍道而論文則其人品之髙下何由而見哉夫言者心之聲而文又言之精者也心明乎道故其言皆可法昧乎道者反是是故理明而辭達文之上也理勝乎辭文之次也辭勝乎理不足謂之文矣況磔裂靡陋以趨時好者乎今觀閩中吳先生聞過齋集敘事嚴整議論正大雄健宏奥離合變化一歸於理非通經博古之精而信之篤養之有素何能致是韓子有云根之茂者其實邃膏之沃者其光曄仁義之人其言藹如也信然哉先生平生剛直終身隠約未嘗求知於人然非其人則亦莫能知也如尚書宣城貢公翰林學士晉安林公皆擅文名當世不易下人惟於先生者深加敬畏則其人品可知矣矧文章如良金美玉自有定價何待後世如揚子雲者出而後知耶先生没迨今逾十五年是集藏於門人王偁家近吾友胡伯寜氏同知鹽運於閩見而喜之將於其同志建寜郡守芮君志文率好義之士為鋟諸梓以廣其傳間以公事道過鄉郡出以示余請序自顧老病昏塞安敢謂知言哉鄙野之辭不足軒輊姑書此以志景仰之私云歲在辛巳春正既望將仕佐郎前温州府儒學教授永嘉徐起書
