body:
  text: 聞過齊集卷七元吳海撰針銘題跋贊聞過齊針海自始知學竊有志乎聖人之道然資質愚昧平日所為鮮能不悖于理中夜以思惕然內懼誠以人之有過不能自知而他人知之人知之而或將告之不知其樂聞與否也則亦將不告而已矣然則雖欲聞之安得而聞之用是扁其見賔㑹友之所曰聞過齊夫過而人告之幸也過而不聞不幸也告之而不受受之而不悔悔而不改是自棄也海雖不敏其忍遽自棄乎敢因以請而針用自警云人之有過鮮能自知知而必改其躬乃治嗟豫小子實寡實陋雖曰有志而未克就修心以思据己而為是敢謂然自信不疑憂心皇皇如疾在體曷賜之藥而有弗喜幽幽冥行擲埴取塗曷炬燭之而有弗趨君子愛人示之以德既教既戒俾我弗惑善遷則有過改則無申以朝夕誨于坐隅慎獨齊針爾身不善衆則知之爾心不善人莫能窺既形諸心爾則知矣奚必十手然後為指凡已善惡不與于人欺人則那欺己欺天念之未與鬼神莫測庸執爾心主一無適所謂一者非物可尋專靜而存儼乎若臨兢兢夔䕫罔敢或易如是而發發必當理嗚呼夙夜敬之敬之少或不謹去道逺而古人有言不愧屋漏在室然矣出則無咎靜慎其守動省其機斯㬰弗替勉哉庶幾慎獨針右丞龔思永得太子賜書慎獨二字請為銘之人之一身心實為主外以應物內焉發慮是心之發其端甚微人不能測惟已獨知惟正惟邪為善為惡為公為清亦為私濁當其發時如弩機張繆則千里差由毫釐于何慎之閒居暗室慎之又慎深致其力勿謂爾獨上帝實臨勿謂無人爾既有心孰明匪幽曷隱不顯無怠細微戒其不善一念不善勿使之萌不自欺已意乃可誠心正身修家齊國治舉而措之若掌斯指噫言之甚易為之甚難難於塞川難於為山星文煌煌青宫所賜野人作針以相君子吳彛字針族諸孫彛始冠楊先生字之曰有常豫重為之針以厲成德云民有常德實天賦生藴而為性發而為情手攝足履目視耳聆必循有則乃踐厥形聖人安之渾然天成賢人執之反身而誠道不可離理無定名承親為孝事上為貞禮正家室義敦弟兄四方上下舉潔其平毋縱爾欲度爾常程毋越爾分懼爾弗稱常言必謹常行勿輕見得視義思寵若驚多金重組布被藜羮在命有定適時或丁匪巧所謀非力能抨惟善常率惡爾常懲反常為異妖或以憑反常為逆禍乃以興有常弗惑有常弗爭嗟嗟小子如日方升告教爾字爾式斯聽如轡在御如木從繩動考爾常闕射斯正靜守爾常心存目營德輶如毛言舉弗勝道豈不逺在人能𢎞隆師親友博史窮經聿觀往昔載稽典刑朂爾不怠德立道凝自天降佑胡考以寧我言諄諄爾將服膺葉遲字針君子之道以靜為主寬則能容衆善所具裕則不固學乃以聚言出而詳不躁不瞽行慎而周不躓不仆慮時以動人孰爾拒事至必審義焉是取欲速不達進鋭速去溫溫其恭惟德之府雍雍其和爾躬則豫爰錫爾字曰仲綽甫承天之休福祿黃耉愚樂齊針吳居貞扁所居室曰愚樂或問之曰子以為大智若愚學老氏之學者哉將玩弄世故而自處默默乎將與衆嬰兒而自為溪谷乎將忌清泠而為汙瀆乎將以退為進思不殆不辱乎將䖍斫是虞為不材之木乎將與人有餘而自取不足乎將為不屑而惟善其獨乎不然而奚其愚之足樂也居貞曰吾豈為是數者哉吾質鈍而懵于事然觀世之騁智用私而務計數者終日役役然竭力疲體勞神敝精而忘其性命吾恥焉病焉不若拙之無作僞靜之得自適也故以愚樂名焉吾將學為聖賢之徒肯從老氏者哉豫聞其言而喜之因其請針以朂之在昔顔淵善學聖人終日如愚步趨遽遽在陋巷樂不知其貧其愚如何四勿謹身博文約禮從子循循其愚如何仰鑽瞻忽卓爾益親天道且變心不違仁曰吳氏子亦克有志寧樂其愚不飾其智名其齊居朝仰夕企顔何人哉希之則是惜隂齊針陳生璚自表其齊曰惜隂求豫言針以貽之為學之要務在能勤勤則業進不勤志分古人為學孜孜求益靡寒靡暑亦靡朝夕孫康映雪匡衡鑿壁董生課餘家園絶迹韓子焚膏窮年弗息嗜學若兹寧不成德今人為學或怠以嬉既間既斷無有緝熙暴棄不憚忍于自欺四十無聞由古所悲嗚呼人少易壯壯者易衰髮白齒豁駸駸相追及時不學汝將何為大禹聖人寸隂尚惜衆人分隂豈可虛擲暖衣飽食無所用心語德則病奚異獸禽臍不可噬後悔何任誦言座隅以代砭針古鼎銘劉監丞家畜古鼎相傳商時物殆未必然然此器非近代所能造也玩之起敬為之銘曰貌質而野氣渾以堅我覿斯器如其人然噫古人不可作矣其心猶將托是器而傳耶古劍銘玉使君有鑄劍甚古將埋之求豫銘以識之為之銘曰氣射斗牛鋒剸蛟犀利固在爾用兮有時淵深靜蟄雷聲奮飛石磬銘彼之硜硜乎叩之而鳴乎誰哉有心乎石巵銘奉無墜飲無醉不訾爾器孝經圖跋李龍眠善畫固其一癖嘗見詩豳風圖離騷九歌圖商山四皓圖此孝經圖皆有益于世士大夫游戲翰墨亦不可苟世俗但稱其描寫之工安知其用意之逺是豈立本道子輩可比耶題風雨歸舟圖千林暝色風雨凄凄萬里長江波濤洶湧一棹獨歸亦足慰人意題醉圖右醉圖坐而飲者三人從旁卧者一人坐而背相倚者三人抱琴而行不進者一人扶曳蹁躚顧而笑者二人一人俯而傾憑者在其前一人仰而頽僮從後擁一人弛衣跣足偃首橫體若斃兩僮舉而遷之凡醉者十三人僮四人嗟夫彼舉而遷者身世已不可知頽者傾者微二僮即仆矣還顧者豈不見抱琴為可笑耶坐者三人度不能起欲相倚以為安乃頸折腕脫兩手據地各披一面而飲者方且拍浮舉白酣酣相屬不知卧者已在旁矣嗟夫孰不飲酒也而遽至于是是果何美而嗜之不置前者昏昏不省後人之尚飲後人但飲肯顧前人之已迷商辛以此亡其國江左諸人以此亡人之國良工心苦徒發醒者之笑是徒醉魂千載猶未寤耳題商山四皓圖嘗觀李伯時畫商山四皓圖意趣幽逺筆力精妙宛然千數百載如見其人因念少時讀西漢傳四君子避秦亂以去采芝賦詩若遺世者至漢髙欲易太子大臣不能止吕后用留侯計延致四君子復出遂從太子見上此卷謂馬逺作豫雖不能識然韻度髙古亦足為佳觀其三人離立矍鑠蒿目若深憂攢首若共語一人仰空曳杖去之豈計欲出山三人已相唯諾其一人尚未定耶將昔人之見與豫同固因畫以寄意耶毋乃畫者不省其布置偶若是耶是足以發豫衷而已題太公釣渭圖古之豪傑之士不幸遭時之否而隱乎崆峒之野寂寞之鄉與草木同腐而不悔及值時之亨則出而經綸天地品育萬彚使三綱九疇得其敘昆蟲草木遂其性其出處固自有道豈容易議哉如夏伊尹商伯夷吕望是已下如商山四老魯爾生嚴光之徒皆進退不辱至皇甫希之周顒盧藏用輩當時之譏不免況後世耶方山山人持太公釣渭圖求題一言語稱吕望釣于渭濵年八十矣遇西伯出獵載之以歸至武王時有牧野鷹揚之舉拯民水火以安天下其功不細矣然孟子言世無文王則終焉後世如是圖者罕見豈無太公耶抑無文王耶拊卷三歎書三先生帖後右三先生手帖伊川晦翁各一南軒二伊川書世不多見南軒答宜州一帖論莫才都事公文之外别附此簡見閫臣州將之情相通而慮事之詳如此伊川書敦重朴素如周彛商鼎巧麗遇之自廢南軒書精神動越晦翁書意思雍容其心畫皆出于自然令人敬慕不已彼世俗專以媚為工而學者紛然追以求其似亦何謂哉醉道士圖跋畫以興趣韻度精神為佳三者不足而位置徒善則模搭古人者耳是圖引稱唐人用懷素詩語作醉僧圖道士屢以此嘲僧僧以錢十萬求左相閻立本作醉道士圖以敵之夫醉僧圖行舉世同一噱何乃獨仇道士立本位已顯又可十萬强役哉或者立本見醉僧圖其故習尚發則未可知而此特其􅎓本豈好事者托之以自售題引又從而佐之乎噫道家者流宗老子老子以清净為法烏有其徒若是荒湎哉就令有之亦不足為世損益惟士大夫若是則不可然則是圖獨不為士大夫商監乎題劉監丞所藏海嶽菴圖前代畫山水至兩米而其法大變蓋意過于形蘇子瞻所謂得其理者是圖山峯隱映林木慘淡長江千里之勢宛然目中胸次非有萬斛風雨不能下筆安得此筆盡畫洞庭三峽石城赤壁使未至者若履其地耶吾嘗見真本于新安鄭處正家他皆臨本題孫位畫馬融吹笛圖史稱季長美辭貌好吹笛才髙博洽為世通儒教生徒千人坐髙堂施絳帳列女倡歌舞于前器服多侈飾後世傳寫之者豈非謂儒者盛節足夸耀哉吾觀張禹亦然然禹之門乃有彭宣融之門有盧植彼二子之于其師若在模範之外豈獨隆性乎是圖當畫東觀南郡非涼州朔方時耳若董子帷講誦世乃不畫將以其淡泊不足動人耳目乎噫師道立則善人多漢始失之叔孫故後來稱師若張馬使魯兩生之道行人皆如董子漢獨不可為三代耶東京文學未議也已醉道士圖跋豫屢見醉道士圖所寫醉餘顛倒猖狂之態備矣然皆宋人所作是圖規模體度有非唐人不能及者而其臨榻亦易識也題鼬食瓜圖鼬鼠食瓜物之恆情也而人共憎之重瓜耳噫鼬食瓜則憎彼碩鼠食麥食黍食太倉鼷鼠食郊牛反不重不憎何耶跋羅源黃氏所藏朱文公手帖文公先生道德事功被百世其寸紙片墨流落人間自當為世所寶況平生交舊往復書札其子孫寶之宜如何邪此卷前四幅文公與黃運使書後兩幅右曹與左藏書五世孫煜出以相示捧玩之餘敬識于左夫君子之于前修往哲觀其迹則思其人慕其人則企其行非徒寶之而已跋藍仲晦書三體千文古人作字不苟其運意執筆各自有度故其結體嚴密隨態而自妍近日稱善書者率皆市倡妖冶備極無一㸃貞淑之氣使人赧恨不已此卷三千餘字清健雅麗沈著痛快篆得古意草解分𨽻無一脫法無一敗筆足見君之所養窮而不挫老而益堅故其發于心畫如此然未知世好如何也噫知之者鮮矣題半方所明月也能方不見階前影影方形且圓何礙隨闕病中秋夜坐心有悟焉若有助成此章者因題其所曰半方敢求敦好翁作小篆諸君子發之邱鍔啓道在天地間無乎不在在人之所契焉若吾夫子歎川流之逝子思子視鳶魚之察伯淳並花栁而至樂存堯夫玩風月而清意足彼四君子則然他人其不謂然乎蓋達人因時而知化遇物而燭理景觸于外妙契于中明月在天容光必照隨規而圓隨矩而方方圓大小不繫于其所受至體無虧因遇而應若邱隱君之所悟不其殆是乎夫如是則謂之方亦可不謂之方亦可以之名亦可不以之名亦可隱君之言固不盡意意有在于言之外將有善悟者得之宋少帝賜髙應松辭參政不允詔後書宋至德祐國事已非元年二月似道出督而自潰宜中當國冬十月遣栁嶽赴燕城議納土求封小國直學士髙應松辭草表乃以京局劉裒然權直院為之二年二月少帝北遷參政髙應松僉樞謝堂臺臣阮登炳郭珙陳春伯等從行是時王爚為相而去章鑑為相而遁陳文龍黃鏞僉樞密辭母老而遁陳宜中劉夢炎為相又相繼而遁惟前相江萬里家居赴水死其餘執政臺諫侍從制帥監司守臣往往多降與遁逮景炎十月陳宜中又遁而宋亡矣嗟夫委質為臣固將死之仕危邦無可去之義安享其利危則弃之誠亦何心觀詔中求助之言甚切其志亦可悲矣若應松亦可謂不失臣節也已彼一時降與遁者何人使髙公亦或為彼之為今此詔猶存簡書不足畏獨不愧其子孫乎此詔髙氏保之幸勿使諸降遁者子孫見之將置遺恨于其祖也書張原霆文集後世俗為文務詞勝而已然多不根于理豈古人立言之意哉吾輩幸生濓洛諸儒之後聖賢之道大明于是為文而不根于理則更無足觀已張生此卷殆百餘篇皆于道不背信有本者如是夫琴贊元統甲戌豫以十金質一大古琴名曰霜鍾其聲清以亮韻以辨自然以安超然而逺聞嘗試之數琴合奏一曲出户逺聽之衆聲之中一聲缺衆聲而獨鳴者霜鍾也信其寶矣愛之甚調之三年反諸其人不能忘之為之贊以記之匪絲匪竹豐山之鍾匪搏匪拊至音渢渢凝霜在野素月流中冥心有契神化無功霜鍾本泉州某故家世器至治間蘇某者為泉州府推官求于故家不與後以事起獄其家出百金以賂不許必得琴乃已既得甚寶之雖百金不易也後家貧其子以質十金于豫豫復寶之三年而贖歸時價尚五十金又數年家益貧遂十五金貨之豫亦不能復售也因贊霜鍾漫記其事混沌子贊古之君子抱其美而不諧于世或隱居以求志或任情而自放故有以號易名而因以寓其意若天隨參寥之屬今劉生子中憤時俗之險鷙喬詰將游心乎太古之先探道于杳微之極號混沌子固請于豫為之贊曰泰始茫沕泯然有無形之未形而奚名乎至人優游獨與道俱不病于末不羡于初何以言之混兮混兮天地之母沌兮沌兮萬物之祖寂兮默兮冥兮奭兮守之至沖達之無疵昔顔氏之子孔謂庶幾既得心齊終日如愚彼知與象罔皆安能得珠孰假修其術逮其訊諸逍遙道人真贊昻然霄漢之志裒然宗廟之器錚乎金鐵之剛絢乎組繪之秀豈毫絲之末所能寫其一二然袖中黃石之編足下泠風之履殆將與汗漫者為逍遙之遊脫汚濁而弃泥滓也友石山人真贊油然春雨之心肅若秋霜之氣鷙鳥獨擊冥鴻髙逝昔時皂蓋朱幡今日麻袍草履此山之巔彼水之涘長吟獨行與石為友直方贊潁川陳某始來郡城豫識之晢白疏俊好學而文裒然佳公子也不見將三十年今年訪豫七巖山下雖風采故在而顔亦向蒼聽其論嶷然不隨流俗波靡豫喜之夫人年少氣鋭未嘗見事莫不妄自許髙視闊步議論隘一時語爵祿金玉不肯屑意至其終身所經營者乃其所不屑者也不幸遇患難窮困百為不得一遂則垂首帖耳低志下意視顔色于人若戚施籧篨然者何限也若子之意氣今昔未嘗少異豈不賢于人哉子以直方自號請言于豫豫惟子之賢于人而不狎于人者固其在此然以自守則可以自矜則不可矜雖未至于忿戾亦必取怨疾于人其非君子之道也吾之愛子也故以君子之道語焉昔者闕中得正故動而直與方苟非柔順之德恆于中則其動未必能然然直而至于訐方至于不可行則亦焉用為德矣昔人有惡曲者終身不乘車有惡圓者終身不肯仰視天好惡之蔽甚至于此今子之好直誠無若昔人之惡曲子之喜方誠無如昔人之惡圓曰直與方皆以順發之則其德豈有不善者乎為之贊曰坤有至性曰順與柔善承乎天其德優優二于其間正體凝位動直以方吉無不利厥利伊何直乃其正方乃其義君子法之敬以直內義以方外敬義既立德斯不孤無行不宜又何疑乎曰直與方于是為大聖賢可幾孰不豫畏薛子威真贊畫所能擬者子之形容所不能寫者子之心胸好學如不足為德務益充其待物也恕其愛民若恫單父宓子賤中牟魯恭觀者因吾言以求之則薛子焉可逢自贊爾之憂謂學之不修其不憂蓋于人何求追往駕而不及喟獨行其誰仇策駑鈍以自厲將歲月之無遒惟岱髙其可仰庶卒歲而優游聞過齊集卷七
