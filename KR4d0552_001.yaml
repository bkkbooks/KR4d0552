body:
  text: 聞過齋集卷一元吳海撰敘吳氏世譜序按吳本姬姓泰伯之後以國氏後子孫散居天下其在閩有繇光州來者唐光啓中有曰英從王氏入閩相傳始祖也海昔為兒童聞先君言幼時見吾父嘗閲巨帙問曰此族譜也自先世宗族及後代子孫悉録於是吾父不幸沒於易代之際母倉猝棄産擕幼入古靈山中依外家以居譜牒遺失吾年方九歲及冠乃歸又言吾支故不蕃吾曽祖舉進士初授寧國府知録而卒曽祖生祖及叔祖而叔祖無子先祖生吾父兄弟四人長及季又無嗣次僅得一子而吾父乃生我及叔寧知後世何如也又言吾先世家郡城東後徙居下渡侯官吳帝俞自橫棣來繼石鱉之宗至則謁先君講兄弟之禮曰兄派河口河口派出侯官吾逼族也帝俞生與先君同年而月日差後侯官兵不及耉老猶存其言必當有受先君又言吾前後詢吾譜殆三十餘年而竟莫能得其諸族分已久而吾所記特近宜其不能合也苟終吾身而不得其作於汝乎先君即世海追承先志嗣而録之恐於是弗作則來者益無所考昔穀梁子有言信以傳信疑以傳疑吾亦由是而已吾父吾所見之世也寧國以下吾所聞於吾父也此傳信也其他則傳疑也吾不敢以疑為信故是譜斷自寧國以下抑吾於此重有感焉古者宗法行於天下宗族有所統一人心有所聨屬故孝弟隆而習俗美先王之治易易然是法既廢人各以意自私其親恩不廣而義不終至有視周親若塗人者然則今日所賴惟簡牒之存使知木本水原之義是譜所以作也嗟夫夫人孰不念祖宗哉亦孰不願其子若孫世世親睦哉而祖宗之望有不若豫乎苟推豫之心以及祖宗則逺者猶近疏者猶親服斬而情不斬屬盡而愛無窮夫恩固賴於相成而道實原於自致子焉自致其孝無怨乎父之不慈父焉自致其慈無疾乎子之不孝兄焉自致其友無責乎弟之不恭弟焉自致其恭無恤乎兄之不友致於已而不望於人則其道易成也是則海命譜之意非亶為紀名系設也嗚呼子孫念敬之哉嗚呼子孫念敬之哉一譜首為圖具世次而派别之以名系世蓋略以考派别則不紊無後者直疏其下曰絶謂無子而不置後者有官者疏曰某官從後授遷居者曰遷某所一首既為圖以繫世次次為譜亦以派别乃詳記名字行次娶某氏歷官某生子幾人某甲子生年若干卒葬某處某人為志若遷居者備述其由一譜後述先世家訓文字略者及墓志若先世著述文字多者别為集不録於此先世家訓及述子孫保藏之以傳後人一子孫名次從水木火土金行為一世五行相生循環無窮一子孫行次五行從名次五行男陽女隂世次易考如名從水則行次男壬一女癸一名從木則行次男甲一女乙一之類每世從一起數則不相紊一後世子孫有棄父母出家為僧為道者不録謂不繫世次也一後世有無子不立宗人而以壻與外孫為繼者不録直疏其下曰絶謂其自絶於祖宗也一喪事不得用浮屠道士營修科典不惟於死者無益而生者重有損一葬事隨力厚薄不得用俗禮焚化大不孝後雖有悔終不能及一浯州府君嘗謂海曰吾行四方樂鄒魯土風之厚甚欲徙居其地萬一不能汝能承吾志乎厚本録序人之大倫有五而父子夫婦兄弟莫先焉此人道之始也蓋三者居於內而君臣朋友際於外內者由恩而起義外者因義以生恩恩厚則義無不隆矣世學不明風俗益薄人之道將不立於天下豫甚懼焉暇日採托傳記小説凡古今孝子順孫節婦列女兄弟之相友姒娣之相宜者著為一編必求其行事卓卓而不尚乎多將使夫婦女童稚里巷小人皆向誦而習之養心以成德猝有變故禍難當有所守又附以感應禍福禽獸微物各為一卷意謂人道固所當盡有不能者觀於報應之間亦可以勸矣而又不察則禽獸微物固猶有人心者其可不自愧乎以人道本於此故名曰厚本録若夫君臣之事則有史册在朋友之義則學者所講此不録自試方題乙亥嵗豫自武林疾歸逾年弗瘳以至於困前後閲醫二十餘輩最後醫來但診脈即辭去皆云不可治始甚憂即不可如何則安以俟之賴先世藏書頗多醫方亦數十種稍讀之以意度其可用者試之每一試而一疾卒減遂屢試之疾以次而除畢是嵗脫然悉去體矣自後遍閲諸方遇家人有疾請醫弗效者又屢試之頗皆得愈因録前後所試及意度可者裒為集以備遺忘而便檢尋不幸有疾又將以自試而非敢以試人也葬書敘地理之説不可謂無也古人别州分土卜宅營葬率皆用之則其不可廢亦明矣世技術之流張其説以自神而禍害吉慶紛紛然起慕利圖福者往往深信為所欺賣説愈熾而人情愈疑理愈晦而人事愈繆相承既久雖知術者亦不自知其誣也可勝歎哉昔不孝孤嘗負罪於天地久不獲伸先君葬非其土比改葬而兆域果為水潦所侵用是痛志以求其法取古今葬家之言掇其向於理者彚為四卷以示子孫使不為邪説所蠱而與我同病者或將覽焉必能棄其慕利圖福之心而專求必信無悔之道則亦可以自恔乎庶不為淫巫瞽史眩也雙谷敘贈秦景容至正二十一年魏郡秦君景容來為福建行省郎中先是平章普公募商胡克舟寇有功胡因益暴橫君至綱紀甚嚴其衆屢謀害君而不敢動即亂普公得除南臺以出而燕公實來代之兵頓城外屢挫議者皆欲講解以紓難君獨以為不可卒平之君欲去黨亂數人臺臣佑之嗾臬司以飛語中君君退居水西里自號雙谷他日謂吳海曰裕伯生也介量不容物不能與衆雷同終以致咎今號欲重自改蓋其文取諸名若字其義取諸容也子幸有以教我乎豫曰諾夫古人之取號非以表其微則以針其闕君之有取於是豈非以其廓然太虛淵乎有容善來而必受可以益德與惡至而弗逆可以寡怨與容大德也君子之於人無所不容惟不能與小人並立夫子相魯先去正卯後世稱名公卿當其年盛氣壯才茂而識敏天下事蔑足滯其慮者其進賢若拔茅其屛邪若去草矣及其更歷既久磨礪已深位益尊而望益重顧乃詘焉若訥避焉若遜閔焉若不足混是非墨白而並容之前後所為若二人者多矣豈其髮衰志墮有弗覺邪將慮熟計精故為是乾沒也夫務姑息容小人貽敗國家與務為兼容以安其身皆自私而不廣豈斷斷能容者邪惟君子能容必有所不容今君以不容亂人為小人所不容乃用是自警得無少有悔乎抑君之號取雙焉一以示其容容乎一以寓其不容容乎不然谷一而已君由其虛中之義而用以優柔寬綽天下之善將盡歸之天下之惡將盡化之徒恐或者不察以苟容為德而責於君則乖已送龍江書院山長敘漳居七閩底東南傅大海西北引潮汀諸山地僻且多險羣獠憑溪洞以居時出為民患古以南荒視之晉始置郡宋朱文公過化而後北溪陳氏出焉其民益讀書知禮義往時蹈難死義之夫貞烈不二之婦亦既有之至順元統間盜賊連起攻城剽邑殺掠民庶然卒不能一日據而有者其故何哉聖賢之流風未遠向背順逆之在人心者易曉雖以盜賊之暴而民不從教之有益於世如是哉漳有書院在九龍江始因文公而置兵興以來他郡邑學官或燬或哆鞠為茂草博士僦居民舍嗜逐利棄弦誦寥然其存者不過為士卒之營壘矣而漳故皆無恙亦氣數適然也尤溪陳生以俊茂之資廣學而多識為龍江學官來諗别且求言豫曰噫天下古今治亂時世不同而人心無不同者理一而已夫獸困則鬭鳥窮則啄皆非其欲也勢蹙而不得顧其死耳在上者以賦斂為飲食刑辟為娛樂民安得保其生哉夫欲使民回心而向道士雖窮而不舍義雖死而不為亂則教之事也今漳學官有宫室廩食有弟子得以施其教生之行不為徒取具員而已其見諸儒必勸之以篤學力行尊文公陳氏之道勿為流俗所變見父老子弟必勉之以孝悌忠信事上不悖有問政者亦將告之曰民安則政理安民在於富之使民有所賴焉則難動而易固矣郡幕府潘君吾故人也久不相見勞為致謝區區焉美監郡編役敘古之役民用其力而已然嵗不過三日其用之為甚輕唐制嵗役民二旬有事而加役免其調役三旬則租調俱免不幸有蟲霜水旱之災即課役悉除之意用其力則緩其財用其財則紓其力民者國之本不欲傷之也後世役浸重有但用其力而國家立法非不善後益誅取焉福建當天下彈丸黑子之地比年盜賊軍旅飢饉民死傷流亡之餘視舊不加衆也地之所産物視舊不加多也而今日官員吏胥何啻三十倍於舊百司皂𨽻無賴亡命之徒詭為兵者不知幾十倍於舊又鄰省他州不能即治所而寓於此者是皆給在何人常賦不充至於預借勸助不足乃立科率民無所出至捐生而逭禍者屢有之矣豈非目前之事耶郡侯在任久知役法之病奉省憲命而新之卒事衆稱其仁有老父言曰福州附版圖將九十年至治以來法凡六更夫民力不齊大者三十年小者十年強弱異矣官據籍不知變弱者不過一役即貧貧而貸之況有不貸乎間一更法當事者或恃其明察或負其強悍以獨見為精敏以衆詢為不能聚數百人於庭鞭笞拷掠責其成於一二日之間吏巧法與豪猾表裏貧民受抑無訴彼且擅以為名聲不亦誤耶今侯自建局以至竣事屛去刑罰朝夕費千百言諄諄勸告侯豈不賢於彼哉吁侯入宫自撫其子為之節飲食時寢興曰吾子也誠愛之矣而坐黃堂之上視其傫然在下者其不曰是亦吾子也問其疾病察其所苦亦思有以寬之耶侯之心於是蓋可推矣嗚呼使在上者能馭下以寬在下者能撫民以寬則庶幾其有瘳乎贈劉僉憲卷後序國家設官分職倣古制置亷訪使者布諸道撫臨郡邑立內外臺以總之其意甚周百年境土奠安政治鮮闕此之由也自古一代之興必有一代之制其綱紀所繫治亂關之國家綱紀繫於風憲自海內多故以來民心皇皇無所底止雖守令叨殘之所致亦由任是職者不能提綱振紀取國家立法之意自壞之閩雖僻逺比年風憲益弛自劉君之除人已想其風采比至見其約已守法百司肅然不敢犯其行部舉刺各宜民志慰悅紀綱法度殆復振舉矣一旦慨然念其親老將棄職奉太夫人以歸有持君善迹示余徴言者豫曰劉君剛方質直天性也聰察強敏學力也守法不撓忠之餘也仁恕不苛孝之推也大夫人年已耄耋君辭秩為養去之宜也獨惜夫風紀既壞將復振而遽去也是為國家去也若夫政迹之詳在於諸人之言不復書贈醫師郭徽言敘舉天下之術惠利足以及人溥而不窮者惟醫為然古人以醫與相並稱蓋相賢否係天下安危醫良庸關斯人壽夭小大不侔顧其類同耳醫師郭氏吾郡之良也居閩縣官賢里先世由科目仕有人其得攻瘍術四世矣瘍醫世稱外科謂於內科不通執是技者不過辨其瘇潰金折之屬制其祝藥劀殺之劑而已於切脈審證湯飲醪醴之用不與焉郭氏謂瘍雖外實發於內必先去其本然後施瘍治以五毒五藥次第攻調之兼其內不獨守其外故舉他醫不能者雖居逺村然都邑之來迎者無虛日有貧不能賫一錢謁者靡不為盡心他郡不遠千里求之若郭氏之術可謂致精也已豫於郭氏善而最善徽言徽言之為人信乎古所謂有恆者而其有勛又克賴焉豫益喜常念與郭氏厚無以及其子孫適進士黃某來求言豫因得以言贈夫心和氣和形和起居以時飲食以宜六沴不干諸瘍毋生此一身之安也上下和內外和閨門合睦昆弟輯諧釁隙不形災害不作此一家之安也或不然加之以正而報者常逆施之以恩而復者常讐則亦安之而已情逆者必自反也事逆者必深忍也此安之長久也凡豫所言徽言既已行之而享其利矣誠願徽言之子若孫修徽言之道而世世享其利焉則豫與郭氏厚平日愛望之意醫之事吾何敢言之哉然吾聞良醫多隂德他日有起家為公相者皆未可知也醫國之道亦猶其治家與身也郭氏子孫尚勉之哉送林生赴延平學正敘古者天子諸侯由國都至閭巷皆有學教立而道彰化興而俗敦秦廢儒術民以法令為師漢唐惟宗太學郡邑雖稍置學官而教術已龎宋朝始尊學政州郡倣成均增置正録教授秩卑郡將不敢以曹屬遇之國朝遵宋氏之舊然教授於學事無不領簿書錢榖悉皆蒞焉太守憲臣不知體者遂以有司責之而不任是職者亦往往有司自處獨學正職掌規矩學録職程課業無有司之事得專行其教里人林生性端慤識見開敏為學務切已省試授延平學正來别且請益豫曰古之為政者教學為先今惟存文具而已教者所以導民使為政者易治也教之不行為政者之病也然而弗察也古之教者擇師為甚嚴非取其威儀詞藻在乎德行道藝也師不善必更之慮教尼也揚雄謂師者人之模範而弗善焉害哉吁治之不興教禍之也然而弗察也乃若子者可以教矣生辭曰瓛不敏不足以辱教事惟落學是懼願先生卒成之豫曰聖人有言主忠信夫忠信有諸已也水之潤用以澤火之熱用以烹人賴之忠信有諸已也子行乎哉以子所有施於人子所未有者聖賢方册皆子師也記曰學然後知不足教然後知困夫知不足也知困也然後能自反也自強也是教學相長也矧延平四君子之鄉去今未遠流風遺教必有在其人者子訪詢而或得之他日南歸吾將從子求益焉贈閩縣學教諭敘教諭邑學官也漢以來文學校魏宋唐博士皆以士通經者為之國朝初用郡學計吏小吏滿考輒為學官知會計矣烏能知教哉向嘗竊謂宜選郡學訓導嵗久者則士業素厲為教有方近年更以鄉貢士亞等為之則宋待補也里人林某年富學茂一應鄉試即中亞等授閩縣學教諭衆榮之而生俯然若不足一日來謁豫曰某材學未自信遽職教事大懼弗任願先生有以教之豫曰閩里邑也子邑士也邑中之人非子親戚則朋友故舊也識子者大半矣教之行易耳古人之教以身不以言今夫執卷誦章句操觚牘騁詞翰欲以取科第為子之榮者夥矣是不賴子也子獨修而身齊而家睦而親戚正而鄉黨有一善朝行之夕傳焉不數日而播之百里非難也故子之教易矣況子一門諸父昆弟皆鄉學又中亞等者三人人信之子之教不難也夫教者治之本也生勉之仕途發軔方自此始今日為百里師善其教他日為百里宰必能善其政矣送王潮州敘豫少負意氣自謂天下無難事及壯見世之仕者多不稱且云某地難治某事難集竊疑焉既又有能者乃知人之材不相逮而居以營私者衆也逮犬馬齒衰矣觀古人益多閲世故益深乃知天下特有不可為之時耳而事實無難者顧難得其人也河西王君用文剛直明快遇事剖決權勢不能奪人以為難者君處之有餘刃治永福羅源吏畏若神民戴之猶父母比去耄倪蔽道垂地而不可進君何以致人若是哉由其存心也公律已也嚴愛民也誠故苞苴內謁不行也而姦欺屛息強梗馴化利之所在知之必與民興之害之所伏知之必與民除之孜孜焉惟懼其政之僻而又和易可近故民疾痛輒聞凡八閩蹤迹未嘗至者人莫不慕焉分省陳公辟居幕府每有贊翊既而以邉陲多擾非剛明仁恕之材不足以鎮之以郎中出守潮州兼督循梅惠州任固重矣四州之民幸矣然陳公遠一良佐豈不甚可惜哉君行過豫别請曰先生何以教我豫曰德則君有之惠則民賴之譽則四方聞焉然豫得無贈乎夫為山者在乎積土石也不欲崇朽壤為川者在乎納衆流也不欲涵汚惡君子為政在任賢材也不欲雜小人自古君子少而小人多小人情偽百端其入人也易將覺之也難宋韓魏公號稱賢相或者猶謂其明於知君子暗於别小人君其慎諸贈順昌縣綜理官敘國初時福建置行省尋以地狹不足容大府而罷再置復罷近復治上命臣信出鎮凡事得以便宜行之福建西北阻大敵頓兵數萬之衆一日費恆數百金供億之繁民不堪命省府以郡邑權輕擇精悍果敢之材舉為幕屬俾制焉勢隆法重指事可集顧以為甚善處置也延平屬邑曰順昌綜理者聞其惠聲適豫有宗人來始相見勞苦之宗人曰吾邑是幸得賢綜理林公民賴以寬不然死矣安能復相見耶順昌小邑當往來之衝纍嵗盜賊殘燬之餘存者不能室屋以居田萊荒蕪丁壯從戎民食一粥又轉餉方殷百工器械之資猝然令下朝戒而夕取辦他邑盡乘刑罰督責吾邑特召社胥里長敦切告之民至期輸則公喜以為不至於罰也又蹙然閔若知其出之不易也間有不能足亦不忍遽罰則民固已輒知之矣豫曰信然哉是仁者之用心也其果賢矣夫上之所需下無不應或有無不齊不能具於臨時特少寬之事既不闕而民亦免於戾豈不上下俱得哉謂猛者集事寬者亦未嘗廢事也然寬者民愛而懷猛者民殘而怨為政何苦不求其懷而求其怨乎吾觀前史所載若朱邑龔遂召信臣其所居見稱所去見思沒則祠而祀之又子孫世世昌盛享爵祿無巳若郅都寧成王溫舒輩非惟禍逮其身子孫亦無遺類豈非天道好仁惡暴其微亦可畏也今順昌得賢綜理如此他邑必有聞之而自改者林公惠利所及不獨百里也況行愈久而迹愈著吾見朝廷擢大任賁顯寵將自此始若其子孫之昌大則天理自然之報也宗人曰吾子之言誠使為善者勸為惡者戒豈獨吾邑之人樂聞願書以貽之潘氏世譜敘自世姓之學微而氏族之源溷而難分而又更數大亂故家譜牒存者十不能一二雖有仁人孝子之心欲推其本於百世之上廣其恩於百代之下者亦將何所從哉大田潘注述其世系與嘗聞於其父並討一二同姓得其大略將為家牒以傳子孫而來告豫豫曰尊祖敬宗而收親睦族人道之大也治家之所由始也古人甚重焉宗法不行漢以來猶尚郡望唐亦尊世族乃有一姓妄相承者衆以為譏見人之良心不容巳也近代益不由禮法壻與甥及外孫為後者何限皆由不勝婦人之見以自滅官府不治而風化安焉人之類將至於大亂矣使譜牒不明其將何以正之按閩縣清亷里潘氏與懷安瓜山潘氏同宗當其盛時宗族殆百人今皆絶而不續間有存者無非以他姓繼潘氏一脈凜乎不墮惟注一身而已然則子之為譜其可不益嚴乎子為譜由子而上直書之宗族絶續可徴者據實而書之同族别居他所者備書之有名字徒存而支屬不可尋者亦散而録之其有棄家為僧為道者不録以異姓來繼者著其所從而其後不録則今日所屬將來可畏潘氏信譜矣送燕經歷入京敘嵗強圉協洽江東憲經歷燕君在閩臺臣以大兵南下將臨江淮而閩浙兵力不足犄角燕君通達強敏識時務且自江東歸知其地形人情及近日事遣如京師請師因陳虛實利害士大夫多為詩歌餞行者屬豫敘之豫不曉世故直據已意而言自古及今天下之事莫不有其機得其機者事半而功倍不得其機者事倍而功半況有至於不可為者亦由屢失其機耳往者中原之亂朝廷嘗命丞相督伐髙郵是時天下之民引領而望王師者莫不以日為嵗奈何間言寢兵於內詔旨據行於外王師既班民大失望此機一失乃至數嵗比者忠襄奮烈剗平大難事已垂集而功不終豈非天耶今丞相克篤忠貞以恢復為己任事機之會良在此時燕君之行所請宜無不允者然事有機亦當有本古人不以城池為固兵甲為利者以民心為之本也海隅之民倒懸已甚生不自聊而賦斂日蹙刑罰日滋朝廷亦思固其本乎使其本固則無時而非可乘之機矣野人之見如此燕君以為何如王氏家譜敘河西古諸羌漢武帝時始置郡後擊逐而空其地徙漢人實之唐肅宗起靈武悉召其兵赴難乘間為吐蕃所吞後張義朝發鄆兵二千餘人往戍河西之有中國人以此周廣順間申師厚為河西節度使用王廷翰等為將蓋中國人子孫也宋朝李元實據之為邊患寶元康定相繼用兵士有陷沒者逮中原為金並不能自還雜為夏人元初得天下惟河西纍年不服最後乃服世祖以其人剛直守義嘉之賜姓唐兀氏俾附歸籍次蒙古一等其俗自别舊羌為蕃河西陷沒人為漢河西而士宦者皆舍舊氏用新氏國家尚寬厚雖占舊氏不禁然能存者僅一二數若今福建江西行省郎中王君翰先世齊人沒元昊者其宗族在東阿陽穀甚盛國初附屬時其髙祖即復歸山東殁從其族葬陽穀曽祖從右丞昂吉下江淮以功授武德將軍領兵千户鎮廬州迄今又三世墳墓皆在廬州逮軍襲職乃冠舊氏名上一日出家牒相示豫觀其自曽祖以來皆著私名而以河西名綴其意謂新氏乃天子所命而不敢違舊氏乃祖宗所傳而不可棄故兼録之所以尊君而重祖也噫世薄俗漓人惟功利之趨而不固其本固有自毁其祖而冒國籍以求仕之顯者安有既授賜姓猶不忍舍其舊乎吾閲是譜不覺為之感歎況其後世子孫能以祖宗為心者乎推此心也以往孝在是也忠在是也節義可為也功業可成也彼自棄其祖者使得觀是譜而能動心悔焉庶亦可改也是譜足以勸世也魯客敘海幼時先君子嘗撫海言曰吾行四方樂鄒魯士風之厚吾將徙居焉苟不遂汝能成吾志乎海雖幼嘗在念不忘比長獲接先生長者交海內名士大夫莫不詢知其土俗其去意大決然丁內外艱情事未效加以眷戀親戚懷故重新逡巡二十餘年而道路不通矣如是因循又二十餘年而纍愈重勢愈牽暇日憮然以思曰昔吾幼無識時先人猶以囑我今有識而反忘之乎自是未嘗一日不疚於懷懼或隕越無以承先君子之志乃自號魯生或譏曰子自擬兩生乎豫曰非也吾擇善俗率先志也吾取號有三吾將地魯而取其名也質魯又取其義也吾學魯仲尼之道焉聖人千載之上吾師也吾雖百世之下學者也謂之魯生不亦可乎而吾又何擬乎又必以為不可將曰魯客志豫未得反乎魯也今雖在閩吾客也雖造四方亦客也他日至於魯而止焉則為魯人而子又何議乎敘以曉或人傅德謙復氏名字敘貴溪倪氏金溪傅氏二族所居地甚邇而纍世婚姻倪嘗一支絶不立宗人以出為繼故傅氏嗣為倪五世矣有曰韜伯文者嘗病而疑咨於閩郡吳海曰韜之先本傅氏自髙祖以來後於倪非倪也而冒之倪本傅也而不得為傅二者將曷從豫曰按春秋莒人滅鄫穀梁曰取後於莒非兵滅也立異姓以蒞祭祀滅亡之道也夫是以辨族不可遷也宗以相承必同屬也子復之曰髙祖以來百餘年遽復之人必惑且宗人皆不欲而韜獨復可乎曰昔冒而今正人何惑宗人不欲子獨復何不可曰復之而後世不吾順奈何曰子為譜敘其由繇髙祖而下正之為私譜他日有能知禮敦本者必從子改矣曰昔倪氏以後託我今復則絶其續奈何曰子復故而為倪氏立後以傅氏女配之代雖遠而系不絶氏得辨而鬼有歸子勿疑禮無異姓為後者使天下後世有議子罪則在海也伯文於是惕然懼曰吾子貺大惠其敢不承命既又請曰韜娠時父出外始生母命名崇德比謁於父父因之及冠母字之德謙後從師師乃更名範字伯文季父又改今名然韜亦常竊不自安豫曰禮君子已孤不更名謂父不能知也名雖不善猶不可改況其善乎請復名崇德伯文謝曰名正矣然字無警吾子遂易之豫曰子之字命於母取義備矣夫德務崇而謙其柄謙者不自足而取諸人地中有山之象焉復請字德謙以無忘母命德謙於是泫然涕曰昔吾母甚賢教子有方字名以義吾無識屢更今以子之言復之猶復見吾母受其教吾子之貺大矣請書以為朝夕戒孫氏二子名字敘孫氏二子願忠從臨川傅先生學既冠先生與之字願曰必恭甫忠曰必信甫而為之請於豫曰吾子重有以教之他日有成其敢忘賜焉豫謝不敏然不敢辭夫恭者非取臯陶九德之目曰願而恭乎信者非取孔子之言主忠信乎願者質之素恭者禮之存願雖純慤有餘恭則受人之益故願必在乎恭也盡已為忠以實為信盡已則不欺已以實則不欺人故忠必在乎信也願思之爾之質既願乎抑亦有不願乎願矣亦恭乎抑亦有未恭乎忠思之爾之心果忠乎抑亦有不忠乎忠矣亦信乎抑亦有未信乎守爾慤篤爾貞毋朴而固敬以自治毋任情直致謹以德而非自是願也勉之勿枉已勿誣人發必自盡行無詭隨言必可踐慎出諸其口忠也勉之夫人至親莫若父子親則愛愛則願其成人子生而被之美名所以望其終身也世多以榮富夀考為名者其分皆賦於天而不由於人若為德則由於人而不由於天僉憲公篤厚誠實好善不倦不以在天者望於人而以在人者責其子朝夕命之使朝夕自稱焉稱其名則思其所以名先生又從而字以表其名使必有以成其名必恭也必信也爾不究是豈不負父與師哉然以僉憲公之賢為之父以傅先生之賢為之師朝夕親炙吾見二子之有成也豫與傅先生交善又與公相知愛念其猶吾子故於其請也出盡言以針送傅德謙還臨川敘豫以學朴行方不同於時氣質頑鈍不能自改以適時之宜既屢顛沛不悔則其終身不變亦可知矣吾郡之賢者與遠方之來名士大夫有知其愚念欲開之而辱與之遊者不過數人焉其餘一再相見始雖其心甚勤而終則漸疏非特其遠我而吾亦幸之豫之不材若是而望交遊之衆聞見之廣其可得哉始傅君德謙來自臨川邂逅一見即相愛若宿契是豈無故而然耶德謙學古道不悅流俗其志與豫同行已合誼不顧衆人之譏笑其操與豫同爵祿金玉不役其心惟自適為樂其趣與豫同讀書有得冥然感於中精神領會端坐若失其嗜與豫同閲古史撫治亂得失之機廢興成敗之迹英雄豪傑之運用馳騁大賢君子之經綸施設正人直士之淪落不偶讒口佞舌之枉忠害善忠臣烈夫之仗節死義未嘗不搏髀拊案奮聲大快或長吁扼腕流涕縱橫其狂又與豫同也喪亂以來無家可復其窮又與豫同也凡與豫同者若是其不同者幾何故人結交以知心為難故有舉一世莫知其心而上求古之人下俟乎後之人者今德謙與豫同斯世而相知也顧豫亦何幸哉德謙舍我而别豫豈不自傷而又傷德謙德謙不可留豫將何以為贈夫天下之義理無窮而學無止法古人所以孜孜斃而後已者蓋海平日所自勵請誦之於德謙也德謙顛沛流離之餘宜增益益深又何待豫言抑終不能無戚戚者所知既遠念不得相益亦難乎其為情也言之不足故咏歌之傅君隘流俗舉步追古人古人去已遠斯道為荆榛出門抱髙志區區向誰陳十年江海上漂泊但一身念我德不孤邂逅遂見親相知寧苦晚不覺逾三春精微共探討議論發清新誼合然諾重途窮憂思頻如何語離别使我意酸辛酸辛不在别欲留我何貧閩水東赴海楚山西入秦春波正浩蕩誰能知其津梅花莊詩敘齊謹之别墅樹梅三百本花時瑩然素合縞積如冰林雪谷謹之結小菴其中吟嘯自適聞有幽人佳士則必延致流觴賦詩焚香彈琴終日不倦率以為常謂豫曰是菴未有扁題曰梅花莊如何豫曰清矣哉主人之福也夫朝市紱冕之所興貨財之所集求名與利者日趨焉肩相摩而踵相接惟夫山林邱壑之間空虛寥寂世之遠聲利薄世故者乃能居之賀知章之鑑湖鄭子真之谷口司空圖之王官彼皆自得其所而人莫與之爭今梅花之勝豈一人所得專奈何攘攘者不知其樂以與謹之專之然則豈得不謂謹之之福耶謹之又就其深擇盤石之上將構小屋堊以白作雪洞前引水為長渠然後莊中之景始備謹之有梅花十詠士大夫能詩者率和之裒為卷俾豫敘其端俟雪洞成日使童子誦佳章豫倚樹擊節能發梅花一笑聞過齋集卷一
