body:
  text: 聞過齊集卷二元吳海撰敘送徐宗度敘豫始聞建安徐君宗度之名而未識也其為校官來三山豫居村落不及交其後再至乃得相見丰神瑩然議論通達經史諸子百家之言靡不貫穿其為文由先秦以下逮近作者莫不淹涵浸漬在其胸中隨所擇焉而發間出其所纂書皇王大訓曰古今帝王之道與其為治之具盡在是矣經世鳴道集曰聖賢之道載之言觀其言足知其所用心愚平日讀書遇有所契輒萃而録之顧以真西山大學衍義為未純也以昔人所編文粹文類之屬為未精也故二十有餘年用力於斯業而未成也將以貽後之人焉噫其功可不謂勤其志可不謂遠且大哉夫古之君子有志於世而不用則有所著述如荀卿王通之倫彼皆抱其藴而與時不合既不可暴然白諸人而未必信顧不得已援筆而書之以授其徒而後世或有取之者至如蕭統之撰文選李臯之集文輿之類則無不得已而特其好焉者耳今君之所纂録豈亦有不得已而為之耶將無不得已而直好焉者耶避亂來山中居與豫甚邇時則聞其所未聞豫方賴君為益而君遽然以别需豫言豫曰人生聚難散易當其聚時之樂不知有别時之戚今别時之戚不知别後何如也君行慎自愛閩與建相接一水泝洄若登天苟沿流而下則五日可至君别後乘興能如王子猷繼剡溪千古風致否送程伯崇還江西敘海齒未壯時目當世竊有陵谷之憂間形諸言聞者鮮不謂之狂人又三十餘年不幸而遂驗夫國之興衰係乎人一時公卿大夫隆虛飾外以苟容為賢附順為忠夸誕為髙敏給為才詭誣為智諛諂為敬雖至儒者亦然使世之人踵踵然慕效之嗟乎元之末造風俗好尚毁譽若是國之亡非偶然也豫始以侗直朴固見病於時及瞷時之所為然後乃大駭知舉世之尚僞少適其真於是益自守不願與世俗交往程君伯崇自翰苑出掌文臺邂逅一見竊怪不類乎今世之仕宦者及往來益深議論益密然後得盡君之平生君性沖淡靜而寡欲不能立崖岸坦然盎然者也然如是亦固為當世棄而能優游京師出入館閣與四方縉紳韋布交遊雖不為所稱亦不為所病豈其中又有異於吾之所言者而吾不及知耶時事既殊向之矜名者所守一切塗地而君流離困厄不失平素然後吾之知君益信豫以足疾不能入郭且數歲矣交游絶消息豫亦不敢以音問及之遽聞行李將反江西欲俟溪滸握手一别而未可卜懼其逺而勤豫思也故敘以贈送吳生敘豫故有山水之癖自其為兒時已然侍宦行遊途中遇佳勝處佇立不忍徙年二十常疾病一日忽夢登蜀嶺斜景照耀俯視山川炫然若金碧回望東南數峯謂是五老既寤汗浹而疾遂以瘳嗟夫人之癖有若是顧夢而可以已疾乎每懷三山五嶽之雄江淮河海之壯不得縱遊其間然歷荒都廢闕靈壇壞址古賢之遺風豪傑英雄之餘迹未嘗不徘徊往來咨嗟慨歎或至使人向隅者今老矣視昏聽瞶顛滿如雪舍杖不可以步而此志亦衰矣而子方治北裝將省其親有數千里之行來别復觸之而感覺向來之癖未盡去子行乎哉子之行雖有數千里之勞而閲山川風土之廣察古今時物之變以增見聞廣胸次必有動子喜而興子悲者歸而語我豈不逾於聽夢耶子行乎哉為我謝尊公别已久此心未嘗不繫左右計公之念我亦然曷日歸來山月溪風尚無恙林氏宗譜題辭譜牒之作示不忘也夫人不忘乎祖然後能不忝乎祖不忘宗族然後能親睦乎宗族孝弟之道蓋在是矣孝弟者天下之達道也不忘則孝弟興矣侯官水西林氏五代時周奉節令文尉肇居於此實為始祖奉節以下子孫昌衍文物彬彬然至於今十有六世矣其十三世孫某重修圖志立儀文詳具明白使先世易以稽而後代有所守可謂不忘者矣抑吾於此可以觀世德焉昔人有言德盛者流光德薄者流卑夫祖宗積行纍功能覆被其子孫至十世而不墜者非賢不能也況又十六世乎況又有能表章之乎夫能修其文則能繼其志已能厚於家則能達之政已吾於某蓋有望焉嗚呼勉之覺是先生文集敘古者文以載道非苟為空言亦非篤意於求工也漢氏以來而文始涉乎技矣由司馬相如以濫靡之詞飾夸諛之智舉世慕之相承至於魏晉六代而亂雜瑣碎不勝其弊至唐韓子然後能反乎古逮宋歐蘇而其氣益振蓋雖與世升降亦在乎人之自為耳然非聰明俊拔之士學問博洽識見精敏者雖畢其平生之力有不能至焉則亦可謂難矣國朝自程吳諸公以來凡十餘人相繼擅為文章或號簡古或推富贍或稱溫雅或宏肆浩汗或魁壘多竒或敷腴清潤或恬淡淵永莫不各得其趣自成一家若公之文宏健雅肆其敘事明潔類太史公其運意精深類柳子厚其遣辭不滯類蘇子瞻其視國朝諸公固不多讓或與並駕而爭進也昔公嘗與豫論古今人文章上下豫試問曰公乃自比何人公笑曰能為東坡乎是雖一時戲笑之言亦其內有所信而人不知者晚嵗養疾山中屢言曩驅馳州縣時有所應酬多不出本意欲删去舊藁而索不可得公前後所作文輒録以貽豫蓄之殆二百首遭亂失去今公家所存僅若干首間以公意删其一二詩凡三百餘篇皆豪宕遒逸其四言益渾厚近古公才氣英邁不易出人下其見諸政事已然而其文亦然然喜與人議論聞善則服則人不及也公名泉生字清源覺是其自號云新安吳氏家譜敘嗚呼吾觀新安吳氏之譜而得其二善焉其足法矣乎吳氏自居新安以來十有二世有曰天麟者以甥出繼於舅又五世矣在鄭則知其為吳也在吳則見其非鄭也蓋自天麟之出而吳諸不絶書既著其繼鄭之由又紀其子孫之名以系世次至於今未嘗廢故權也得有以考而復之夫為是譜者不既仁矣乎仁者不遺其親亦不間人之親權之復其故也其亦仁者之心乎吾於是得二善焉夫異姓之不可以相承猶馬之不可以繼牛桃之不可以續李也祖宗之於子孫一血氣之所傳也彼以壻與甥外孫為繼者亦曰吾血氣之所傳是大惑也夫坤道善成而不為主非天施則地不生故婦人之族不可以承夫也奈之何舉世安之而不為非也不亦祖非其祖族非其族乎夫祖非其祖而自棄其祖族非其族而自離其族此人心之所不安也奈之何舉世安之而不為非也吾於是有取焉者蓋取得夫子存羊之意亦孝弟之不容已也嗚呼是可以為世法矣是可以為世法矣楊徽字敘楊文質先生與豫交久而敬深他日見其嗣子徽曰吾兒魯鈍不能讀書嗣吾業又不能操耒耜服田畝奈何厄於貧其終將以技食營錐刀之利以糊口乎然既娶且抱子矣鄰里鄉黨不欲名斥思有以賁其稱者幸因吾子謀之豫視徽朴以素慤以願喜焉夫徽者美也朴而不離其真素而不事於飾慤則自守也專願則於人無競其質可謂美矣質美而後可以入道夫子所謂繪事後素者也徽也由是日修其孝弟忠信焉夫孝者事親之美弟者事長之美忠者處已之美信者待人之美此內美也金玉之富軒冕之榮第宅之華服食之鮮則外美也內美則願爾有之彼外美者得與不得固在天而不在人君子不以為美也請字曰仲美古者士之子常為士為士不足則為農農又不能則從事於末其勢然也其等雖不同也而其行則無不同也仲美勉之他日使人稱曰慶元君子之裔雖貧且賤則固賢於人矣此豫之所望亦而父而祖之所望也仲美勉之文質謝曰子之言實出我心請書而授之簡於是乎書吳氏家譜敘姓氏以别族類而已皆出於古聖賢之裔卿大夫之家晉宋以來遂分差次非法之正也閩自漢武帝時盡徙其民江淮而墟其地後入居者多四方之人亦不一姓矣水西髙隑吳氏不詳所本始由行商至此喜其地遂居焉閲其圖由昶而下凡十四世田園自業資用饒裕至東乃從豫學東外家與豫同里閈異時豫避亂嘗客於東東以同姓故稱豫伯父豫亦姪視之他日求一辭題系端豫曰我先祖后稷以農立國周公亦明農後世豪傑之土不見於時皆勤身畎畝之中古者農之秀為士士不足則為農農與士常相出入也吾以衰病無庸志願耕田而筋力不逮嘗以子孫落學不能事農為恨吾見子數世皆顓謹朴實藹然淳古之風非立本者不浮乎勤勞既久將有所發子其勉之子以同姓待我厚則待同宗當厚於我待其至親當益厚於同宗凡自是推之而已詩云無念爾祖聿修厥德如是則可以承先世之澤如是則可以衍方來之福東也勉之後世子孫亦莫不勉之潘氏族譜敘氏所以辨族也族所以廣親也系所以原逺也自宗法不行而先王之禮廢民忽忘其本有能念先祖而厚宗族者蓋鮮蓋族衆則易疏代逺則易忘此常人之情不能自其本推之將見愈疏而愈忘也譜牒之作衰世之意也嗟夫自一人之身分而至於千百人之身由一人之世傳而至於千百年之世自千百人視之誠已疏自一人視之則不疏由千百年舉之誠已逺由一人舉之則非逺且吾之所以望吾子孫者孰不欲其廣而不疏乎孰不欲其久而不忘乎何等而上之之不及其等而下之也何待其祖宗之不及待其子孫也何其不能反而思之也譜之設蓋欲其賢者因心而篤之不肖者反求而得之有以企而及之也懷安瓜山潘得寧氏出其家譜求題一言豫觀其譜自文振公以來十五世矣文振以上不著所從來文振兄弟四人於倫為次一昆二季譜皆不及獨記其所居地為詳有足考者兹亦可謂闕矣若其先世宦顯有階至金紫光祿大夫者女適人有為宰相夫人者其賢有學于朱氏為世名儒者抑可謂盛矣傳世既久不能無顯晦絶續今之存者由得寧觀之則皆疏且逺矣得寧讀祖父之書教授於鄉凡吾前所云者皆將責之子也由子之身修之以親其族人以倡其後人因以率其鄉人夫顧不偉歟嗚呼勉之送鄭訓導之古田敘百里之邑有學官置文學一人掌凡學之政令招邑之秀民子弟入學選經明行修之士延請為之師師治諸生講誦課業傳授而程督之其位雖卑而其任則重教之尼行人材之成否率由是耳古田故為壯縣提封之廣居民之衆邑里之華文物之盛蓋彬彬焉他邑鮮及也邇年凋弊甚矣聞皆不如昔吾黨鄭生以選為邑學師將行來别辭曰某也於學每見其不足也今其可以教人乎豫曰子之言善矣即子之言可以為教矣夫學至於聖人猶不自足也況衆人乎夫道無巨細精粗無乎不在而實髙且逺也惟升髙者必自下陟逺者必自邇也此為學之序也夫學能知不足則必力力則無有間斷而進進不已進進而不已焉則無髙逺之不至也彼躐等驟進好髙欲速者望道必不見為學必無成也子行乎哉以子不能足之心施於人使人人得子不能足之心以為學使其志立誼明躬修學得則措之於用無所不可苟務外而不務內事人而不事已者少有得焉則矜夸侈大傲然自肆其去道益逺矣抑非君子之用心也因子之言導邑之諸生彼幸毋謂我耄而言迂魏氏支𣲖圖敘圖譜之設所以辨氏族定世次也古人甚重焉自離亂薦更故家大族能保而存之蓋鮮夫圖以著名必簡而易見譜以記實則備而致詳此圖譜之所以異也然古人多稱譜而不及圖近世多為圖而不及譜故其圖之所載雜亂繁碎遽覽之而不能識浮屠正念奉其族支𣲖圖為謁按其先姓魏氏由玉融來長樂為陳氏嗣子孫有知禮者乃復姓魏氏居桃坑十有二世所記歷官娶婦女適某人生年若干卒葬某所皆譜所宜具而非圖之法也既為正之而為之言曰天下之物必有本子孫本於祖宗猶木本水源也世代既遠而宗族益衆夫衆則易疏遠則易忘亦常人之情也故蘇老泉著族譜引曰自一人之身分而至於塗人者勢也勢吾無如之何也而歐陽子曰人而不知祖宗是禽獸也吾嘗重是而病蘇言也夫世久而疏逺雖勢惟情愛之不可忘乃理也如使數世之後服絶已久屬疏已甚其相視遽可若途人乎詩云雖有他人不如我同姓此情性之正也夫圖之設正所以使人不忘祖宗也今魏氏居桃坑十二世苟無是圖以徴之則行於道有不相識者矣況乎人之子孫不能以皆賢賢者固篤於親親而不賢者或昧焉使觀是圖而知木本水源之義知今日行道若將不相識者自祖宗視之固無親疏亦將勉於親睦矣是圖豈小助耶若正念既已出家毁形以從異教而猶惓惓然念其親因林琦來請益見天理之不可泯孝弟之在人心者無時而已也況其宗族兄弟在家者乎正念又致其昆之言曰吾未嘗獲見夫子吾將謀介焉其詞為有禮故遂為之敘卓氏家譜敘閩自黃巢之亂邑里邱墟田萊荆杞其居民往往從他方來爰宅於此始為鄉井皆以豪右所居稱名如黃岡三十六宅之類卓氏之來亦當先後此時相傳由㑹入四明由四明來三山其來三山始居長溪又由長溪分派於閩縣之清亷里與懷安楊﨑之上今所謂卓宅是也清廉楊﨑實相兄弟同出長溪逮今四百年始祖諱邁其間世次名字不可得詳纍經兵火譜牒失之今之所録姑自耳目所及以傳信也求豫序其端豫惟譜牒之作古人甚重焉蓋使人不忘祖宗也使人不棄宗族也祖宗本也宗族枝也枝者本之所生千萬而實一也故宗族雖衆别居雖逺服屬已絶音問不通相視漠然如塗人一旦邂逅出其譜而合焉雖先後百嵗其昭穆次第粲然可考恩疏者復親勢逺者復近豈非以譜牒之故乎此古人所甚重也若卓氏之先垂四百載亦可謂逺也矣苟非祖宗積纍之厚安能長久若是耶祖宗之所積纍非謂廣田宅豐貨財也謂孝弟忠信節儉仁愛修於身而行於家其餘以及後世也為子孫者當思祖宗所以裕後之道勉而行之使世澤不衰而祖宗之傳益以逺大彼三十六宅之後今其蕃衍昌熾不墜不絶者尚幾姓耶嗚呼是可以有鑑哉魏氏世譜敘宋歐陽公著族譜用漢年表法蘇老泉取禮大小宗為次二譜之法非不善然非讀書知古者驟而觀之亦難遽識不若他例之明白而易曉也魏氏先浮光人入閩首居福清後繼長樂陳氏是譜稱始祖者非始祖也由福清徙長樂之始祖也故稱始祖焉譜始於是者近而能詳也不録福清者逺不能詳也地阻屬絶譜不相通欲系之而無由也必述之者不敢忘所自也吾之所以樂為之言者嘉其後陳而能復也噫彼陳氏棄其宗而立他姓魏氏亦棄其宗而後他姓皆失之大者既又能復焉則魏不遺其先而陳自滅其後矣今世之姓氏溷淆往往類此蓋十而五六使閲是譜而有感焉既迷而能復已失而能改豈非錫類之大乎嗚呼閲是譜者可以有戒矣可以有勸矣林和字敘禮樂人之大端也人非禮則不立非樂則不成禮非玉帛樂非鐘鼓之謂謂敬也和也理之不可易情之不可變者也禮樂相資禮雖不可無樂而樂必由於禮蓋禮先而樂後也林氏子和既冠其父為之請字於豫豫曰是子嘗習禮也乎曰未也然則吾將字之曰敦禮夫禮者履也君子之所履也忠信其本義其實也禮不本於忠信謂之虛禮揆諸義而不協謂之忒禮禮也者莊敬嚴畏勤儉恭遜而不與人爭也先王以承天道殽地法管人情蓋得之則生失之則死有禮則安無禮則危君子不可斯須去身也斯須不莊不敬不嚴不畏不勤儉恭遜焉則慢易之心生肌膚不固筋骸無束不至於渙散墜壞而不止禮之不可不重也如此禮之不可不慎也如此昔有子言知和而和不以禮節之亦不可行孔氏過庭之訓尤切然則禮之用雖在於和而和之本實由於禮人不欲學君子則已苟欲學焉舍禮奚以哉噫世學不明禮樂道喪人不為容容苟苟則為朋比阿私顧不患其不能和患其不由禮也不惟禮而惟和吾懼其流而不知其極也其不為鄉之原人則為世之鄙人也者幾希子敦禮哉子敦禮哉孫戣字敘孫戣字景嚴其名與字始皆大父命之其父為之請於豫曰願有以發其義俾戣也勉思自力庶幾克承大父之志豈惟戣也受賜將某亦有賴焉豫辭不獲乃言曰夫戣兵器也古人內以自克而外以威不順者也其嚴乎夫惟剛明正直果斷裁制用無不利而物不能犯所以為嚴也若君子得之以修巳則貞固而亷潔以刑家則整齊而如一以事上則忠信不阿以待人則威而不怒書曰惟干戈省厥躬必先正其本也昔孔聖之孫有曰戣君嚴者守節清苦議論正直為唐名臣韓愈退之嘗論其德古人尚慕前輩或取以自名若司馬犬子慕藺相如遂名相如意者大夫希孔君之賢將使戣也畫一以孔君為師乎孔君之事載在方册昭然可考景嚴動必稽之他日不悖於孔君則為無負於爾祖矣詩云髙山仰止景行行止景嚴勉之薛懷安文集序古人文不苟作必根於理詩不苟作必止乎禮義苟或不然不如無作也懷安薛大夫豫不及識聞其去時邑中送者千餘人攀戀號泣不忍别既去有父老數人持詩文一帙以來示豫曰此吾薛大夫所作吾謹録之吾子不可無贊一辭豫老眊且多病聚足不出山將二十年於世事一不省乃問父老薛大夫為人曰大夫惠人也其愛民若魯恭其處已若田仲其施教若文翁其為政一以德化而不恃刑罰吾民賴之若父母然其去而不能留也吾民安得不戚哉異時為政者不知盡職於已盡心於民惟務其家之肥而視民若土苴故民之視之也其至猶盜賊之臨其去若病疾之脫今薛大夫父母也吾得忘之哉言且泣豫曰信哉薛大夫之賢也不然何其民之愛之之至是也視朱邑之於桐鄉庶其近之矣因閲其所作其文信本於理其詩不徒發其情庶幾逮古之作者而不為苟因大夫之言而見其心因民之思而徴其德薛之賢不誣矣豫所為序者欲使後人誦大夫之文必知大夫之德也大夫名武字子威號雲壑廣陵人世儒者云送寧化訓導序八閩惟汀僻逺其大民質素少文其細民勇而固吏善撫之則易以治不善撫之則易以亂非其俗獨異也教之施有弗至矣夫民知禮則不犯上知義則可服使生厚則自愛往時為政者不知出是惟以禁令法律為主民重不堪遂至無所逃罪非其民之罪也聖人有言不教而殺謂之虐夫教治之本也學校風化之原也教之道德以淑其心教之生産以立其業教之禮義以正其俗教非徒文詞之謂也文詞之為教猶禁令法律之為政也抑末矣夫民知教則良心生教立則善人衆大家既服小民視之而化風俗無不美矣生以溫柔敦厚之學而贊邑教人將信之教之行有日矣於為政豈小助耶生勉之思鳳臺詩並序至正間尚書玩齊貢公來閩寓城西香嚴寺荒茀中得凸地為臺構亭其上以時燕息與其徒講學題曰鳴鳯且自為文記之亦一時盛事也時異事殊屋毁臺圮斷碑卧草中門人鄭桓舁歸瓜山鄉學後有小邱植梧竹焉懷其師而不能忘也名曰思鳯既為記請豫繼之豫能恝然無情乎歌以寫懷併著桓之思云臺有梧其隂孔敷鳯不來兮奈何臺乎臺乎空有梧臺有竹修其如玉鳯不見兮奈何臺乎臺乎空有竹昔之巢兮阿閣亦既下兮虞庭有止其集有雍其鳴去世德而不返使我心兮怦怦登斯臺兮騁望邈秋霄之冥冥我思悠悠日月其征眷焉斯臺憂心如憕薛氏家譜序譜牒之作以親親也人之親莫重乎父子兄弟自吾身而上推而至於逺祖而莫非父也自吾身而下推而究於百世而莫非子也旁而推之自吾之兄弟吾祖吾父之兄弟至凡族人皆世世兄弟之次雖屬有逺近禮有隆殺而義無獨殊者由人之生一本故也世教不立人道大隳愚者昧於其理懦者安於所習不孝不仁者蔑祖宗棄親戚至有無子不立宗人而以他姓為繼自絶其後而不悟不悔使鬼神不得歆其禋祀亦由譜牒不明故也薛本春秋諸侯之國後世因以為氏在唐時居江東者為望族今薛氏世家揚之泰興其派出河東舊有譜而失之其可徴特自髙祖以下故今以為譜首其間他姓為後者皆削而不録或曰彼雖異姓而繼我既久難遽去之毋亦别録以附於後可乎曰不可夫他姓之人自棄其祖而來附吾之祖自撒其姓而來冒吾之姓亦可謂不孝不仁者矣譜正欲其辨也而又混之是何不忍於他姓之非親而能忍於吾姓之至親乎彼他人而吾謂之父子兄弟於心果安於理果可推乎今吾棄而不録使彼亦得反於其族豈不二者俱當耶噫附枝大者其本悴異姓蕃者其宗危觀於薛氏之圖抑可懼已吾子慎之嚴譜牒之法著人倫之義去異姓而革其混淆明本親以篤其恩愛則木本水源發茂流逺宜自今日正譜始薛大夫儒者故以是告之使施之於政亦可以正俗已聞過齊集卷二
