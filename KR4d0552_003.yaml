body:
  text: 聞過齋集卷三元吳海撰記祠堂記昔先君子嘗書積善于家以自命其在外亦書之在器或書之先君子沒海懼其久而遂泯也用揭之祠堂詔不忘焉夫善人所固有也生而莫不善天地之性為性也發而為情亦未始不善也耳目鼻口纍乎欲視聼言動出乎已物我相形萬事相感利害相權也日用酬酢之間有不得其正焉斯其為不善也反之而善非取于外也存其固有者而已矣故雞鳴而起孜孜焉一言之發必稽一為之施必愼晝之所營夜以自考夜之所息旦而驗之造次顚沛不敢忽而況其餘乎夫莫高于天天者髙之積也莫厚于地地者厚之積也莫大于聖人聖人者盛德之積也然則君子為善可以有已乎哉抑古人有言善必積而後成惡雖小而可懼夫善惡之勢常相持也此長則彼消彼長則此消善一日不積則隳一念不繼則怠成者易毁隳者難全甚可畏也海之以是銘者亦惟先志是述將垂之無窮海之不肖敢不戰兢夙夜他日將見先人于地下惟是後世子孫奉承不替則海實大願焉詩云無念爾祖聿修厥德銘曰人性至善出乎自然孰能安之其動也天衆人不能氣拘物誘本心既放遂失其有子孝臣恭夫正婦從豈人實為惟帝降衷視聽有常言動有則一毫不順乃害于德嗚呼夙夜敬之戒之勿縱爾欲勿興爾私欲勝則流私勝則蔽怠勝則滅巧勝則偽人心孔熾善端實微初六履霜堅冰以之精致其知勇致其力纎惡不為善乃可積積日為月積月為時三百六旬積而為期積縷成杼積粒成庾縷粒或遺于積奚取父積遺子祖積遺孫孫亦有後來昆仍雲凡是衆善皆我固有匪為人積曷其不可已則不善又以加人不愧于心不畏于天恭惟我考垂言立則爾不能孝爾罪罔極易曰積善之家必有餘慶積不善之家必有餘殃嗚呼可不愼與後記海既表積善于祠堂仍扁其外扉曰思孝戒奉先者必遵訓也古今人纍金玊廣田宅遺子孫卒皆不能守惟有善者常有後焉夫祖宗積善自所當為耳而為善之福乃及子孫子孫積善亦自所當為耳而為善之美有光前世此祖宗所望于子孫而子孫必體祖宗之心乃以為孝非曰享祀之而已夫孝而後能饗其親故合天道之宜因時物之變中心怵惕而悽愴思之不忘誠極而著烹熟羶薌奉承以進慤信愛敬盡禮而不過失焉鬼豈有不饗乎不然則宫室雖修服物雖具豐盛粢潔牲腯酒清而孝不至焉神或吐之矣夫古人之祭也事死者如事生思死者如不欲生祭之日樂與哀半夫事死如事生則忠之至也思死者如不欲生則愛之至也樂與哀半則思之至也夫古人之祭如是乎故夫祭非難也忠愛之為難忠愛非難也思為難思非難也孝為難將入室者必視斯扁如生理之本直不善不可以為人念祖訓之至勤不孝不可以為子日夜思進于善焉則上可以承祖宗而下有以啓于子孫矣詩云永言孝思孝思維則嗚呼可不敬與銘曰維父與母實生吾身吾之所生子孫至親曽是話言莫匪至教曰善與孝順天之道爾亦有子爾亦有孫有不能孝爾心豈安積金遺之易散難守良田美宅寧數世有書不能讀積亦徒爾惟善固有孝可動天爾不媚天將胡媚焉明明祖訓是訓是式祖宗有善爾世世積凡百子孫敬之無斁獨樂千古軒記有以足于中無待于外裕于巳不求于人則心逸體順神融而氣和樂之發于中如飲者之醉食者之飽充然陶然可以自喻而不可以告人也若嗜利者以貨財為樂耽祿者以勢位為樂彼內實無有而恃物以矜不得則戚得之而惴惴焉恐失之樂果何自而生耶乃至老釋之徒遺形骸絶聖智亦姑足謝外膠耳惟君子能全其性分所有而無私欲之蔽日用之間浩乎天理之流行事至物來應之不勞隨寓而安無入而不自得昔者吾夫子飲水曲肱而樂在其中顔子簞瓢陋巷不改其樂後世學者不能以身體之知其所樂為何事獨孟子言曰萬物皆備于我矣反身而誠樂莫大焉而韓愈亦云仰不愧天俯不怍人內不愧心發撝明白聖賢之樂如是不其至與江東傅崇德好學篤志慕聖賢之道挺然自拔于流俗所居軒題以獨樂千古間謂豫曰是崇德所自命友朋有欲為記且銘者崇德辭焉敢請吾子豫曰夫君子之樂將與衆也而君以獨名生斯世也而君以古名何恝然與人悖哉我知之矣君之志非不欲樂與衆人同斯世也顧衆人之樂與君異而君亦與衆異異不可以苟同夫烏得不獨哉觀斯世不能與同遊心千古之上求與同者而得之夫烏得不千古哉且君嘗學易矣觀隂陽之變萬物之化古今往來治亂相尋聖人所以酬酢萬變者如彼所以洗心退藏者如此凡坐軒中焚香展卷觀其象而玩其辭終日與聖賢對不知一世之樂有易此者乎衆人之樂有若此者乎否也于是傅君作而曰唯願書以為記改軒記宜春夏生請于豫曰敢問為學之道豫曰精知而力行之曰知有不逮繼可以進行有所失則當如何豫曰改之改者天下之大善也成湯以大聖而不吝改過蘧伯玊屢察其非而至于化仲由喜聞過令名垂無窮古之聖賢猶爾況後世學者乎故改者天下之大善也不改而遂失天下之至惡也非遽為至惡也涓涓可以滔天星星乃至燎原故不改者天下之至惡也然人孰肯受天下之至惡哉試以號于衆曰子徒欲為天下之大善耶欲為天下之至惡耶則孰不艴然怒曰是何薄我若是且孰不欲為善人乎試嘗察之則其所為己多不善猶忿人之告已也宋趙康靖公嚴于自治嘗取黑白豆二器置于几上每行一善即投白豆發意一不善即投黑豆數日較之初黑多後適均又後黑絶無矣古之人重改過若此夫知其不善而日日改之以至于無可改豈不為大善乎不知而不改不明知而不改自棄自棄者不可與言改矣況念慮之微方發于中有善不善惟自知之他人不能與為力也然知之誠難知之精在乎窮理而已子試黜子之心而觀古人之心以古人所行驗之子之所行合則由不合則改豫觀孟氏答陳賈戴不勝之言則改之明戒也夏生瞿然曰謹奉教即日以名其軒併求書此為記豫因作二通一以貽夏生一以傅聞過齋自警淡軒記天下之味易牙能辨之而易牙不能嘗于無味非其精有不逮非口之所接也無味者天下之至味也顧得之者鮮矣傅君德謙介特清簡有志古人淡泊之道每憤流俗汙濁欲潔身去之脫埃壒御泠風遨遊乎太初無極之表特病口不能絶粒臂不能植翰耳所居軒名獨樂千古不理于口改名淡軒復請記之豫曰嘻夫所謂淡非吾所謂無味者乎天下之物皆有味而皆無味惟道無味而深有味所謂至味君子淡而不厭是也揚雄云夫味必淡然非易牙之所嘗也人惟德不勝欲而為世味所奪故失其自然有能洗心濯慮使方寸湛然理義以為之主則道充為富不待夫萬鍾身安為貴無藉乎五等疏食惡服不與易文繡膏粱湛然此心淵乎止水隨流而行遇坎則止窮不為悔達不為喜而天下之物惡足以動其中哉視區區勢利之徒亡身以殉欲決性命以叨富貴者猶蠛蠓之慕醯蠅蚋之甘胔誠不知其何味而又何嗜然既謂吾淡矣又敢與之語味哉若君雅志沖淡知用不諧于時覺天下之物為無味而獨沈酣乎理趣咀嚼乎道腴怡然自處栖遲偃仰于一榻之上清風時來振膝獨吟明月入懷引杯孤酌今來古往蘧然一客意到無語與軒相答問軒比南陽諸葛廬西蜀子雲亭謂何軒曰諾遂書此以為記潮州三皇廟記潮州督守王公那木翰以書來言曰吾郡三皇廟舊在澄清里燬於火十五年矣屬時艱虞戎壘在野郡邑失守民莫寧居自翰來此招集懷撫惟民事之急未遑及也既二年矣念祀典所重循是不舉大懼失職乃視故址隘陋規欲改作既度地城西隅合材庀工成有日矣惟殿廡門庭堂室齋厨之位悉如其舊而制度深廣加焉聞古者宫廟之作皆有述也子其為我記之海竊惟洪荒之世有不得而考者矣自伏羲神農黃帝氏作其實始見于經易大傳著伏羲氏畫八卦神農氏作耒耜聚貨為市黃帝氏垂衣裳制舟楫牛馬杵臼弧矢蓋其聰明神智首出庶物其開物成務神化宜民無非因天地之道以立人之道因天地之利以興人之利蓋萬世之道原系焉萬世之治原出焉方風氣未開生民違禽獸不遠微三皇氏繼天立極使五帝三王之治有所承則天地不能以自立嗚呼大哉昔周外史掌三皇之書漢孔安國謂三皇之書謂之三墳言大道也而後世無傳焉夫道尊萬世者享萬世之祀位髙天下者受天下之奉萬世之祀非徒有天下者所得與焉者也若三皇道與天地並功與造化侔雖祠宇遍天下曷足報其萬一哉自古聖帝明王前代罕列通祀惟肇迹之地有祠唐天寶中始制立三皇廟于京師有司以時祭饗元有天下乃令郡縣立廟祀用春秋二季然使醫學掌之取厯代名醫從食于廡下亦有所不講也竊意如唐制天子親致祠焉則于禮為至庶幾一人有得師之實而四海蒙佑神之化顧不韙歟然豈草茅所得議哉乃今多事之秋列郡生靈憔悴已甚而王君獨能緩刑薄賦以蘇民力修廢舉墜以崇祀典興是役而民樂之則其政亦可嘉也遊鼓山記福為八閩都會上四郡皆山地勢局促不能廓以舒下皆瀕海風氣疏蕩不能隩以周惟是州處其中不蕩不局得二者之宜環州之山惟東石鼓為最髙能興雲雨蓋州之望也嵗乙巳九月十五日郡人黃伯宏約豫與廣平程伯崇建安徐宗度自河口買舟順流而下抵白雲廨寺時日已西遇東漈石橋橋覆以亭流水出其下潺潺有聲沿麓稍登澗鳴在左荔隂團團有大石可坐近里許有亭曰乘雲近亭有竅泉行者掬以飲又里許至半山亭亭後少豁俯瞰山下又里許閣曰圓通憩焉閣外踈竹斜映倚闌平睇江流二道如白虹遊龍縈帶長洲靡焉而東趨漁歌互答西山凝暉碧翠異狀前登嶺路夕影射人背轉而右見竒光玲瓏篩林若金色點綴樹上如花嬰條如果有葉華彩相映瑰麗不可名狀玩之久而後去又轉而上皆幽林清樹半里許夾道有小松曰松關日已下山暝色將斂促行度屺表曰全閩第一峰下坂皆平途左為矮垣迤邐達寺已昏黑訪法上人宿于超凡閣明日徑寺右行蔬畦間度松林二三百步入叢篁中徑旁小竹微露綴其上如珠時滴人衣覺清爽出篁竹皆微蹊二里許登小頂峰峰直寺後下視殿閣若騎其尾西望郡城列雉數千市㕓闤闠雜沓鱗次麗譙浮屠臺閣府寺釋老之宫揮霍崇麗閗出其間州邑之雄可為罕儷舊時村墟野落化為瓦礫之場而居者鮮矣由小頂而上又里許近大頂使童僕行前伐灌莽披荊棘擬步而後可進若是二百舉武少轉而南然後造乎屴崱之顛行者盡疲人以意擇石而坐午食畢乃拂石刻觀晦翁大字讀沈公蟻銘摩挲徐麗卿請雨記記漫久乃可辨時晴空景明萬象呈露幽竒詭異不待搜剔自來獻狀使人翛然而塵慮消淡然而情境融極目西北諸峰若數百里攢者騖者凌者鬭者攘者赴者突者簉者特立獨出者齦齶劍戟者西南諸峰若雲矗波湧若牛羊驅若車馬馳逺至數千里之內皆周旋徘徊頓伏妥帖間之以溪壑流之以江河蓋自劍邵來者至水西旗山而止自汀泉來者至水南方山而止自建來者至是山而止若夫建劍汀邵之溪合流至于洪塘分為二江南過石頭納永福之溪與瀨溪出西峽北過新步亦分為二又合而至于長隑乃與西峽江合過石馬下洞受長樂港與敻港出閩安鎮而入于海東南彌望浩蕩不可極逺至于琉球之國近而梅花南交諸島咸在五步之內自永福閩清長樂以至福清之境歷歷可見焉回眺附城諸山前者若迎後者若隨左右環輔森列若大將之治旅尊嚴間暇部伍整肅而不亂南洲諸山若鸞翔鶴翥邱垤礧礧若子之在枰耳滄溟無波上下同色輕飇徐來緑皺千里潮落渚出平沙衍迤蒼鳶白鳥共下齊起日既暮乃刋木為堂束薪為門薦席以莽綴樹張幄寺僧持雞黍來餉亦共宿焉中宵露零月色如午剛風忽起隂􅊤雷動出而視之立不能定五鼓愈甚衆相與捉衾聨立東望扶桑以候朝旭奔星矢馳四面相射有玄雲橫亘在海面髙四五丈不得視其初出之景須臾日上巳髙山煙水霏蒼茫逺近隱顯迭出恍然如畫圖中又一竒也露晞下山至寺已近午出寺左遊靈源洞石磴垂梯兩崖崇墉通以石梁白雲亭其上坐稍久洞谷生風時來襲人起觀蔡君謨書有竒石立道側若甲卒號將軍石于是履危棧度石門求晦翁題名趙子直詩抵天風海濤之亭極焉孤撑巉巖憑闌欲墮川分谷擘江面如沼險絶清曠遂兼得之盤桓至日晡誦楊志行古篇還宿法上人禪房又明日復登超凡閣伯崇題詩閣上觀王氏賜神晏書乃歸是時也比之常觀蓋不侔矣夫升培嶁者隘一方陟岡阜者薄百里乃今縱目力于霄漢納溟渤于胸次晦冥晝夜收拾舉盡豈非所處者益髙所見者益逺所造者益深則所獲益富古人登東山而小魯登泰山而小天下愚雖不及竊冥會之矣嗟夫山川萬古世變無窮景物須同人心異感是遊豈徒登覽之娛有以散其憂愁拂鬱之思發其豪宕雄逸之氣重其治亂興亡之感而峴首之悲牛山之念仰止之慕雖吾四人者亦詎能盡同也且是山昔人莫不發之近百年來人迹罕到自豫始登命樵夫為導亦不知其路乃緣壑徑上顛踣者屢而后得至其所忽得舊路循之而下果達寺蓋宋時所闢而僧除之始絶頂皆短荆無林木今可張幄矣始寺外多數百歲古樹今但見新植矣向豫始登幾三十年重來二十餘年與伯宏來亦十五六年今復得諸君遊此而豫髮種種矣因刻名山石而記其詳約後遊輒復紀之較方來尚幾遊也永思堂記吳元育于其居室之東闢一堂以為祠舍垣墉周嚴門庭邃深清閟靜幽宜神所居祀其先由高祖而下至于禰揭以永思求豫記之曰願聞所以起豫衷警豫惰勸豫後者庶幾是堂賴以不廢豫曰悲夫夫居是堂者皆子孫所欲孝而不可得焉者也欲孝而不可得焉則其思將何已乎言之而無與接視之而無與存聽之而無與傳也夫安得不思乎定省無所于施溫凊無所與時出入無所告行無所受命也夫安得不思乎至于霜露降而天氣肅春雨濡而時物變思之不能已而將有事焉齋戒潔清以致其誠笑貌聲音志意嗜欲不絶于耳目心思然後倣乎有見佛乎有聞入室之日焄蒿悽愴冀其洋洋乎在上也苾芬豐潔冀其食而勿吐也已祭而徹將餕而凝知神之享不享也夫安得不思乎夫祖宗之于子孫苟可以厚之無所不至子孫之于祖宗不過報之祭祀而已祭豈足為孝欲孝者惟在于思乎思承歡之無從而精意以致享思聞教之不復而臻至以自修為善必果思以為親榮見惡必避懼以為親辱當事而思當食而思當寢而思終其身而思之不廢乃所謂永思也若是者可以登此堂也不思者不孝也不孝者不思也于是堂乎奚有于吾言又奚有愼德齋記二憲吳公謁宋潘先生謙之家祠覽其裔孫得寧讀書之室顔之曰愼德而求廣其説于豫豫曰愼者德之基君子無不愼也然德有凶有吉夫理出于天而具于人之心至善而無惡純一而不雜者為吉德肆情而蕩逐物而不返暴逸敗悖者為凶德顧皆謂之德則為德者其可不愼乎夫驅車千里愼于發軔舍矢破的愼于審機行愼于陂言愼于誕意愼于妄動慎于禮取愼于義由衣服飲食威儀之間以至于貧富窮達患難之際無一而不致其慎者無一而不係于德也故慎終如始慎小如大非徒慎而已又必由學焉學則致知知則知所擇慎則致確確則任所守此慎德之要也以生年富才俊欲為訓詁詞翰優矣吳公念子先儒之後將使不墜其緒故書以贈生生其刻勵自慎也昔先生受學考亭其進修之日親得之朱夫子生于室求之有餘矣奚豫足徴烏稷堂記金華杜梁叟以醫名來閩中豫與往來三十年矣始治詩修舉業見世之仕者類不能及物歎曰仕而不得行志焉用仕曷若醫以濟人為得行其志哉乃舍其舊而為岐黃之言得針灸之術於竇氏之門梁叟又能以儒者理致斟酌而廣張之由是其所契益精而所用益神豫素多病前後謁於君無不驗凡士大夫縉紳四方之人來求門如市舟車之迎軿集於巷諸貧民伺君出入籲道上君悉為治之無詞色難者故其所至老稚婦女莫不望而識之咸稱杜公云他日豫問梁叟曰君術何以能若是其妙也豈亦有説與梁叟曰人者天地隂陽之會天雨露風霆地山川草木水火土石人九臟百骸天四時寒暑溫涼地髙下燥濕人喜怒哀樂飲食起居莫非隂陽而已夫得是氣以生亦由是氣以病然病有標本有上下有內外有竒恆吾切其脈視其色察其神氣形志審其隂陽參伍相合而知其所舍而又揆之于天度之于地厭之于已而後行之或治其俞或治其合或治其經井滎溪谷之分筋骨膚肉之部四時之施各有其當九針之用各有其宜虛者實之盛者微之暴者奪之脆者堅之不足補之有餘折之竒之偶之緩之急之上之下之順之逆之正之反之吾治極於一然隨應而動此吾之所以用吾術也曰然則何為若是其妙也曰不知也吾之書曰靜意視義觀適之變是謂冥冥莫知其形見其烏烏見其稷稷從見其飛不知其誰吾守吾法而已雖至其妙吾亦不自知也以子之言吾將名吾堂曰烏稷子盍為我記之豫曰信哉夫道之與事固未嘗相逺也吾聞古之人有善沒者其出入去來若神人請其故曰吾入也以忠信吾出也以忠信故吾雖沒猶出也雖出猶沒也吾不能神亦不知吾所以神噫杜君之醫之妙其猶古人之沒之神乎君且謂不能知則吾何從知之惟忠信則吾所信而君亦自信也忠信所以至于道也何獨醫哉書以為烏稷堂記系之詩云人之有身備乎隂陽隂陽不調疾病乃傷謂醫之良非有他技審疾所在去之而已粗工嘻嘻不知病機九氣既亂七診皆迷病之所生至微至眇萌芽弗絶乃至焚燎良醫明明見入秋毫制其病態使不能逃防之未然測之未至或迎或隨舉適吾意粗工凶凶伐和召凶瞿瞿閔閔暮世則同古稱良醫神聖功巧嗟惟杜君亦造其妙其妙如何妙不可名答如影響視在窅冥冥冥之期若神倣佛中心獨悟口不能出稷稷其稷烏烏者烏不名君堂名誰堂乎鄭公渡記閩上遊四州之水從髙赴下既滙於洪塘遂經臺山帶郡城以東其别流則南循方山而會於長隑臺江古稱險連艦為浮橋以濟行者延祐間始創石梁水道壅遏少有淫雨則暴流泛溢黃岡以上百里皆為巨浸壞廬舍損禾麻無歲無之而其勢日趨於南蕩突激觸鬭噬闕齧江靣益廣舊時臺江之險悉移於此水西水南諸步視為畏津而新隑陽隑實當江流回幹之衝又有隧風不時摧帆折柁舟人相語為戒並岸強獷之徒植黨專濟他舟禁莫得行要利不如意則詬辱百端扁舟葦如坐客俱滿至不勝載而後發少遇風濤率多覆溺前後不可以計至正二十五年秋九月十二日舟覆新隑同死者一十八人餘以救獲免海北二憲鄭公適寓瓜山聞而閔之白大府取巨木百章營二舟募村氓之習於水者操之一自白苗濟陽隑一自新隑濟陽隑置田二十五畝以給操舟者之食不足又將勸好義者益之舟既巨無倉猝之虞濟甚利無邀阻之患由是逺近之人往來者莫不歡欣鼓舞而誦之曰江流渢渢孰濟鄭公我來我往惠我無窮又曰湯湯江水其深不極脫我魚鱉就我几席匪舟也車匪川也途公功不忘其樂也且於是凡詠歌之人與鄉人父老咸來告於豫曰吾儂居水濵不能去舟楫然數十年間阽危者屢矣哀溺者數矣異時舟人怙利且忍視人性命若土芥然雖衆疾之而不能革自公建義渡以來居人絶行者之憂行者如在宇之安獨彼喪其利朝夕懷怏怏之心纍謀所以害而奪之者微鄭公之力其蔑有不廢者哉夫安其利者烏知去其害之難也請吾子記之然鄙人不知故聞昔鄭子産以乘輿濟人溱洧君子非之毋乃以公譏乎豫曰不然夫子産相鄭國方秉其政而濟人國邑之內於政誠有闕故君子非之若公持節他道政不得行於此一觸耳目所聞見遽興惻隱之心不能拯之於先將圖免之於後蓋仁人君子之用心也夫田之薄不可以不增舟之敝不可以不葺公之心猶有望於後之人後之人抑豈無公之心乎使後之人無公之心則人之思公愈無已衆又曰聞古人有所建置而利不忘於人人多以其氏稱之若白公渠蔡公井蘇公堤李長者陂之類願刻石表曰鄭公渡則如何豫曰宜衆咸曰諾遂為記公名潛字彥昭新安人其居官有益於民者類意為之所在時見稱云種德堂記水南蘇氏以善稱於鄉三世矣海於蘇氏識其父祖子孫四世矣珠浦翁簡直好善樂周人之急小浦先生廣其德心遇人有疾病患難窮困其濟之之力殆欲忘其身者而家以是貧德如生自髫稚有知即習所聞見而安之以故人咸稱蘇氏之積善三世聲問聞於旁邑人皆信之無異詞蘇氏舊有堂名種德屬豫記豫惟古人於宫室器物凡命名取義必以自警近世率為賁飾而已有能因名究義飭厲而力行之蓋寡若蘇氏所謂種德云者其可謂身力行之名實相副而不浮者與夫德非自外來也得之於天我固有之也故自吾之愛親慈子而推之以及人之老幼吾食而閔人之不食吾衣而念人之無衣已安而不忍人之危若其惻隱之情出於天性隨寓而發非以納交要譽於人求報冥冥於天也然天道無感而不應人道無施而不酬顧為德者不可以是設心而已蘇氏之樹德已久感者宜應施者宜酬則將在其子孫夫承二德之後不可以不謹也德所以承德也不德所以墜德也生勉乎哉夫恩惠及人德之餘也孝弟忠信仁愛誠實著於身德之本也而祖而父之所種皆自其本推之也夫祖父種德於前子孫繼德於後乃所謂能子也生勉乎哉詩云無念爾祖聿修厥德又云譬猶農夫是穮是蔉雖有飢饉必有豐年請以是為種德堂記重為之銘曰天降民德五常具全匪我獨有於人則偏惟人之發於心最先推以及物寧不為賢有美蘇氏其心塞淵周貧恤患濟弱扶顛曽是三世而不倦焉爾心如種人心如田爾種爾藝不求其年人事之積必格乎天善繼勿墜嗚呼勉旃遊黃巖記水南之山最髙而大者方山山之隂有峯隆然逆馳而西曰黃巖望之特尊歲大旱鄉人必禱焉自豫往來三十年凡方山之勝皆飫覽之惟黃巖僅兩至焉丁未歲杪避兵來此思復一登而淫雨兼旬戊申改紀人日始霽山路泥滑未能即登也越五日乃得遊焉登自前山之麓山皆荔枝無餘木巨石蘿薜綿絡可愛出荔隂入松林憩妙峰小菴菴直西南古靈水西龍湖諸山帷幛屏列望清溪一勺可注尊罍澄江帶如縈過山右水南村落人家可辨良久僧汲山泉煮茗甚佳出菴徐行草徑委蛇徑旁茒葦無復林樹又循岡而進乃抵黃巖之下巖髙十數丈袤不啻倍之壁立陡絶鄉人祠張道者依巖結構堂室樓閣軒檻周廊復道聨屬制度雖狹而寢食燕居臨眺之所具焉屋與巖相庋景與地相宜前山低橫有若户限郡城逺出其北連山周遭大江回繞煙雲吞吐飛鳥往來上下蒼緑紫翠間濃淡之相施逺近之相涵皆於户限外見之亦足以賞心而娛目矣下山復至菴中設食步斜景而歸自前山至巖下約四里凡石憩者六草坐者一班荆而息者再同行六人皆文雅談謔笑咏是遊各極意登降而不知疲焉豈獨忘其患難羇旅之為適哉記之以冠賦詩之首悠然軒記丈夫出處不失大節至於流離窮困而能隨所遇而適者非其中有所得必能以理自遣者也古今達人賢士莫不由之元有天下垂及百載末年士大夫心術不明風俗偷薄陵夷波委以至亡國其高風逺識如國初劉靜修先生其次如歸公彥溫不一二人其竭力死義如余公廷心李公子威者亦不多得豫嘗中夜竊嘆丁未之變計吾平日所知其為人者曰行臺侍御史沛郡韓公前閩省郎中魏郡某公潮州督守靈武王君兹三人者其殆不失節乎既而韓公果不辱以死某人者進退不遂而王君浮海往交占不達屏居龍泉之上謝絶人事與樵夫牧竪為伍室南有山如覿佳客間指謂豫曰吾屏居無聊惟終日與此相對使人意定神怡樂而忘倦吾將竊取陶淵明詩所謂悠然者名吾軒子其與之乎豫曰與君侯哉然則子其為我記之豫曰諾哉夫心有所係皆役於物者也役於物者顧無時而樂求之即即必持之戚戚得之揚揚必失之倀倀嗜欲少者天機深嗜欲多者天機淺夫淵明晉之高士知時之不可而去之與世相忘久矣彼其外物不足以動其中故無欲而自得方其采菊東籬之下悠然而見南山非山能令人悠然也悠然者見山耳故靜而觀之見其安然不可動之象焉見其蒼然不可犯之色焉見其四時有契於中其趣因之而發初不待覩夫崔崔巖巖者然後為有得也嗟夫開闢以來乃有此山獨淵明得其趣今君侯又得其趣山之與人其相遇豈不難哉淵明往矣君侯之繼淵明者尚未艾也神交契合夢寐將或見之龍泉之溪其水清泚山有嘉肴苦茗可瀹可羞豫不憚煩來與君相對茲軒之下君餐秋英之秀色我倚白石之商聲時詠歸去來辭招山靈而聼之友蘭軒記宗姪克成以友蘭字其軒請豫記之豫曰美哉蘭夫蘭有三善焉國香一也幽居二也不以無人而不芳三也夫國香則美至矣幽居則蘄於人薄矣不以無人而不芳則守固而存益深矣三者君子之德具焉夫君子德修於已惟恐其不成其成又惡其暴著故始若虛終若愚敏乎若不足浩乎不知其有餘善實內充而英華外發用則以及物不用遁世而無尤昔者吾夫子傷時不幸鼓琴為猗蘭之操楚屈平作離騷引蘭以自況若是乎蘭之足重今子將以為友豈特愛其素枝紫莖緑葉青青者乎夫光風惠日暢其和明月白露耀其清嚴霜積雪厲其貞階庭深谷所寓不同而其美自若語云與善人居如入芝蘭之室然則子與蘭居不猶入善人之室哉子善友之其以蘭為益友四時朝夕撫其榮挹其華攬其實玩其美之無斁感於中以自得至於久而不聞其芳子友蘭乎蘭友子乎聖人有言德不孤必有鄰將使一鄉之士化於子以至一國之士皆願友焉其機括良在於是克成勉之知止軒記天下之福恆生於無欲而禍每起於貪貪者無厭無厭則不知止不知止故禍必恆隨之然自古及今相接於目前而不戒豈人情不安福樂得禍哉由不能止其貪耳邑人某年少為郡府吏有能聲一旦忽然悟曰吾親老不能養顧為是復役乎即棄之去郭南三十里居焉疏圃鑿池田園自適又創小軒以時燕息環植花卉竒果設几案琴書筆硯客至焚香烹茶酌酒賦詩為娛友人名其軒曰知止豫舊識某比年因臨川傅德謙往來益熟暇日至軒中某請曰願得先生一言豫曰諾哉世之言知止者多誦而不能行者也子能行之則以名軒可哉夫富之與貴人孰不欲而有命焉烏可貪天以求必得而不得則慊乎珠璣象犀兼金大貝産於海外番夷之國去中國數萬里舟行千日而后始至風濤之與凌蛟龍之與爭嗜利者必之焉幸而一遂可以富矣而不止也幸而再遂則大富又幸而又再遂則不勝其富矣而不止橦檣折拉於浩洋之中骨肉充委於魚黿之腹故無待乎止矣髙官重爵大圭長組朝廷懸之以待賢俊功能王公之尊嚴卿大夫之布列未易可造次也慕祿者必趨焉傅會投合鑽刺攘竊幸一得焉可矣再進焉過矣愈進焉極矣彼德不讎乎位才不任其局廢事曠官折趾覆餗小焉刑戮之加大則誅夷之慘故無待乎止矣噫行不知徐必蹶而止食不知飽必飫而止飲酒不節必濡首而止小事尚然況大者乎老子曰知止不殆故知止者無時而不可止不知止者無時而可止無時而可止必至於進不可退不可欲止不得其止噫少而不知止者猶望於其壯壯而不知止者猶望於其老世固有自恃其智老而冒利不已豈不大可哀哉豫喜其名軒之意與豫合為記之歸帆樓記董可久結小樓於其居之左廣度四几邃布兩筵宇可以仰檻可以隱促席合坐可容十人流溝出其下老樹蔭其上橫江前陳州渚間疊連峯迤秀環映回合樓雖狹其景勝矣曩豫嘗一二至焉比來請曰某樓既名矣未有賁也豫曰何名曰間者嘗因友朋徙倚適空明景霽澄波油如飈風徐起數帆自逺而至過於茲樓之外衆賔咸樂舉􅊦相屬顧謂斯樓得無託是名乎遂題曰歸帆幸先生有以發之豫曰諾豫少時嘗涉海矣觀其茫乎無窮浩乎無垠泱漭湠漫噓吸變化凌騰鬱怒顛倒上下將遊神乎八極之表鴻濛之始與虛無為友遺世而不返也逮其浤乎瀜瀜湙湙乎浟浟輕舟緒風一趠百里其靈異詭怪雖足以慊心飫目而震愕之餘悔亦生之逮夫揚帆來歸棹夫唱聲柁師幹機風雨指途濟雖未屆而喜可知矣今復覩是思往日如在目前嗟夫夫天下之至險者莫若水而善負者莫若舟顧水能乘舟亦能覆舟是語里巷所能談道者也至於往往蹈其害而不自覺豈獨里巷之人為然而士大夫固多不免豈非見其可欲而忽其可畏樂其暫安而忘其長危也哉當水生風利之時自謂技堅器良必無可敗之勢誰肯少自引以就所宿哉使水也專能覆而不能乘則舟為無用而亦不至於敗況乎爵祿之海貨財之淵利欲之源其禍愈深其沈漫冒濡溺者愈甚而趨者愈衆何哉思古人之如越國之范蠡漢代之張良以至穆生兩疏之徒能燭於事理審於進退皆可為後世法而世之滔滔知入而不知出知往而不知返者自他人視之如泳之善遊彼且自以為賢於吕梁丈人豈不惑哉然則是樓之命名雖近而充其義則逺矣遂為之文以記雲竹山房記李氏子升家方山之陽逺市㕓去闤闠藹然田野之趣猶以為未足乃鑿室山麓竹樹環之置圖書琴櫝筆研其間詠歌自適題曰雲竹山房請豫記之豫雅愛伯順和易恭慎能嚮善逺利不隨流俗所尚嘗給事分省上官賞其勤同列讓其賢於時不幸閉門靜處昔之富也不驕奢今之貧也無慕羡得時不變其志失勢不衄其氣安分無求恬然若足非通理善守其能若是耶夫山林邱壑畸於世者之所以樂其窮畢其齒也子年富才俊胡為欲放志於此苟以為幽間靜偏人迹罕至可以讀書求道稽古博識耕而徯其穫養而俟其成以為藏修息遊之地則可以為避世傲俗之地則不可夫雲無心以見沒因時而澤物可以占出處之道焉夫竹虛心而直節歲寒而不改可以堅自守之操焉子樂之意子意有所似亦皆有資於子也抑吾所居特逺不得朝夕往來從子之所徒以為恨耳既為記之又撫几而歌之曰山之幽其雲油油雲與子兮奚求仰觀白闕愛竹之青其葉薿薿孰闕霜兮可以變此我思美人在淇之隈在渭之涘東陽橋記東陽故有橋圯廢百餘年矣春雨潦集冬寒闕病焉里人張祿嘗欲營之為富人所害鞭斷石梁事弗果逮其子惠又屢謀作之懼役重力不勝圖回者數年會有贊之者曰事畏不勇不畏難為之必將有成於是帥鄉人轉石輠木建堤兩岸架以修梁上為廈宇以庇風雨下施橫榻以休行者日役二百餘人張悉給其食不再逾時而橋遂成役工凡若干費錢凡若干皆張所施豫往來章山每道其處鄉人曰昔張惠之興是役也富人或笑之及其成也又慚而疾之今張蒙不幸以死然其利猶在顧有以紀之吾聞而閔焉夫為義在志不在貧富富者財力雖有餘惟務多積為子孫計其肯拔一毛以利衆哉貧者又力不贍此建事之所以難也若張者家不及於中人力不足以號召而能斷然有志以倡是役鄉人亦樂而從之見好義之心人人同也彼不能而害人之能者亦獨何心哉則惠誠可表也聞過齋集卷三
