body:
  text: 聞過齋集卷八元呉海撰雜著祭文刋子朱子家禮成讀之有感書齋壁自儆吾讀冠禮而思身之未脩讀昏禮而思家之未齊讀喪禮而思愛親之未純讀祭禮而思事親之未至吾不孝大矣吾罪多矣嗚呼皇天矜予乎祖宗保予乎徃者不可及已惟兢兢以自厲庶來者其免夫感春操傅徳謙作琴操曰感春屬予和之春之陽兮卉木具菲運之愆兮六合具腓時既邁兮可追文欲墜兮凛乎予中之危朝不食兮苦饑夕不寐兮式歌以唏悠悠昊天曷慰我思木石居辭㑹稽胡生放曠不仕自號木石居自名公廣為賦述志亦徵予言予陋且固豈足發明深㫖辭以問之生越人而寓于甌自閩視之地皆北東也故稱北東之人辭曰北東之人兮子何木石之與居桓桓蒼蒼以挺植兮凌霜雪以為娯魁危磊磈終古而不變兮塊獨守夫貞固偭同類而弗羣兮狎異物以為徒將中契而道㝠兮外不言而形喻噫于噫于黄農逺兮有唐有虞莘則耕兮渭以漁我思古人兮中鬱以紓末之從兮吾將穀城與申屠已焉哉松栢斧兮牛蔽其樗石則言兮鞭以驅户且棘兮曷云其途四方上下兮一為籧篨子之所兮何如北東之人兮吾將諗諸答問呉子遯居水西閉門不出客有過焉問曰吾子亦有憂乎曰有曰然吾視子衣服不及時饘粥常或虧終日轉徙無有定居然竊怪乎子室雖貧不踖踖求于人迹雖窮不潰潰撓于中談今道古言論無取偭衆違俗獨立誰與子非拙以愚非喪心失志其不憂如何呉子曰聖人有言貧與賤是人之所惡也不以其道得之不去也是安足憂哉然子謂我愚拙實然亦豈喪心失志乎吾幼好學長而彌篤攀前修之逸駕追徃聖之遐躅既孜孜以求道屢顛沛而不易牽繩制墨以就榘矱年邁伯玉而猶非志慕仲尼而不及閔閔乎老之將至而弗覺也是敢不夙夜惕厲畏且懼乎此吾之内憂也若乃感莘野而懐伊尹仰西山而思伯夷誦鴻鴈而哀流人披王風而悼彼黍而又閔杞人之無寄嗤夸父之不量力則吾之外憂也抑又思夫古之人相告以善相勉以義書曰胥保惠胥教誨今之人相尚以詐相飾以偽詩曰為鬼為蜮若是者皆我所憂而貧則非也客不悅曰吾不曉子所謂吾聞衣食足然後治禮義今子饑寒之不恤而道是謀困躓之不懲而學是力誠所謂憂不切之憂務非急之務已之多云又以慮夫人是何謬惑不通吾向徒愛子今視子若是之固流離困厄皆所自取尚未知底所吾亦何有于間子哉亦不能間子矣揖而去書禍道之不明學害之也學之不純書禍之也今天下之書已多矣然詩書易禮樂春秋孝經論語大學中庸七篇凡六經聖賢之言未嘗多也商周而下秦漢以來十八代之史記記傳表志編年紀事之不可無者未嘗多也所以多者皆諸子百氏外家雜言異端邪說數之不可計其名讀之畢世不能盡其卷帙無益于身心不資于家國非有補于教化風俗治道徒為多矣況其偏蔽邪曲足以堙正理炫耀反覆足以蠱人心其揣摩計較欺奪足以壊治道使人身心不安順上下不相親福禄不下闕十字是書之罪也然其言或放蕩而無涯或幽昧而難窮或狎志下闕十九字易入或近利而有功故世鮮有不好之者至其詼諧鄙俚隱謬神怪之淺近可笑誕妄不足信者則俗儒賤士又争取以為博物洽聞夫楊墨佛老諸書六經之賊也管商申韓諸書治道之賊也遺事外傳史氏之賊也蕪詞蔓說文章之賊也竊意上之人有王者作將悉取其書而禁絶之然後讀書者得以專其力于聖賢之言精其志于身心之學玩其意于國家得失成敗之數考其實于古今治亂興亡之迹如是則學正而道明而書為有益于世不然者日盛一日世滋一世夫豈有窮哉夫欲禁之必自上始使朝廷大臣通經術者㑹諸儒講論定其品目自經史某書某書及宋道學諸儒之遺言不禁其他則皆禁之諸家文集自先秦以來至近世諸人之文悉加纂輯類為大全其餘一切除去自秘府不蓄絶其根本然後出令天下非官所定民間不得輒藏坊市不得刋鬻塲屋引用者黜降停年民間文字不得引用無稽之言如女媧補天長房縮地嫦娥入月阿香駈雷與凡齊諧雜爼列仙傳搜神記幽怪録之類異書既絶數十年之後童稚生長不涉異聞其心志不惑惟經史聖賢之言入者為主于以養徳毓才廣量成器其效豈小小哉書貢尚書閩南集後右尚書貢公遺藁在閩中作者題曰閩南集敘引皆一時名公賛述備矣其門人鄭桓以予于公有一日之雅俾綴一辭然予亦豈知言哉惟國朝文章之盛足以追配前古而公自先文靖公已暴名海内而公實繼之威儀步趨既有家法若富人之子而富服用奉養之有素世官之後而顯風聲習氣出乎自然故公之文豐腴清潤無山林枯槁之態温厚縝宻有臺閣優游之體敷暢條達如春花之妍委蛇演迤如長江之流海之所以竊論公者如是尚憶香嚴寺别時公執手屢問何以益我至不容遜謝乃曰在閩所酬贈不已多乎公慨然深領予意要至蓮花寺信宿尚欲有所傾倒而予不可詎謂此别遂為千古乎因覽遺稿不覺愴然書盧明安事後宜春夏生為予言至正壬辰春紅巾犯江西王師禦之夏生從其舅劉世昌佐噶海齊南書幕府涿人盧明安亦侍父從戎明安端厚簡言有學問生與交甚相得未幾生省母入閩明安父没亦還居豫章戊戌四月十六日陳友諒攻豫章城垂陷明安出伺望欲奉其母以逃至當闕池遇兵入明安度不得脫即自投池中人以告其妻劉劉亦赴池與俱死生既敘其事有譏者曰是死無名明安無官守言責姑聽其執未必見殺豈徒傷勇抑實不智子為傳播子亦祇去哂耳予曰有是哉夫死者人之所嚴生者人之所順苟非懦熟畏怯遑遽失措則必内有所守顛沛之際乃能捨生取義視死如歸耳吾不知明安所植立何如夫明安豈不念母懐孥欲全其性命骨肉特不肯枉已從亂謂生不如死顧欲以死為生耳而劉氏又能奮身以殉其夫非獨情愛之私盖明安讀書平日閨門禮義之化不然一婦人女子倉猝有能若是之勇哉譏者之言毋乃内有所歉故預為是說使他日有官守言責而偷生苟免亦祈人之不議已惡可哉讀管子管夷吾在春秋世稱為名臣其相桓公不過摟諸侯以相伐擅其勢而竊其利其奬王室繼絶攘戎事雖正而心則私不如是不足以成其謀耳書凡分十五篇亡二十餘篇大㑹明法制數設利以致人求其正君道民之術無有也至論黄帝堯湯益誣矣菁茅石壁之謀中智所不為若内業白心等篇其心術之微可見嗟夫彼以利誘其君苟輯于一時而開後世無窮之禍身死而其言已違君薨而國内大亂智不延于身又及其君乎盖其才雖富而心則狹故識甚淺而功可羞然其不仁亦甚矣後世申商晁錯之倫無非宗管仲者孔明自擬豈謂其才邪楊忱推尊管氏亟欲以王覇混之蘇子瞻善論猶以為仁何哉張嵲區區無足道也讀墨韓退之稱墨翟與孔子同道是何言之過歟夫墨之于孔猶紫之于朱也退之未能深明夫子之道徒見墨之言大故從而惑之墨之道愛而無本孟子距之之嚴懼其惑世害仁而誣學者而退之所取乃正在是觀其書以親士為首而修身次之既失先後之序謂聖王率百姓以尊天事鬼尚賢者天鬼百姓之利不上同則天鬼惡而罰之言天必鬼奚不專理哉錐刀井木之喻闕其所長大盛難守則老氏之意而自異于道矣曰得意賢士可不舉不得意賢士不可不舉舉賢亦有異與七經二論䆒其㫖歸不過以力時急而自養儉為治國之本墨翟生戰國之世原其立心以愛則固賢于申韓管商之徒謂其知道則未可烏敢以並孔子哉退之晚歳乃能見道與孟簡書言楊墨之害盖讀墨少作也編録者不知去之耳因讀墨并論之讀鬼谷子鬼谷子三卷二十二章凡以隂為守以捭闔飛箝忤合揣摩為用讀之使人神志遁叛道徳消喪真世之大賊也豈但探囊胠篋發櫃而已哉人非内有所定而遽觀之未必不為所蠱既賊于心必賊于人用而賊天下國家傳而賊于來世若是之書惟當棄而不觀若是之人惟當絶而不交妄與之言必為所誘嗚呼二帝三王之治惟不行而世有是人聖賢君子之學惟不明而世有是書豈徒斯人之不幸抑乃天地之不幸而猶至今存何邪有聖王者作是人固當誅是書固當焚也吁可畏哉題念上人詩集念上人警敏嗜學繙經安禪之餘徃徃從事觚櫝以故多與文士遊為縉紳所重暇日持詩兩卷求益予觀上人之詩其用功可謂勤矣勤則不可禦也夫詩正與禪類學之雖久悟在一朝方其學時何者為悟及其既悟何者為學然未有不學而能悟者上人以吾言騐之他日禪益悟而詩益神矣樸存解鄭純甫學古人之道忳然自守不為文飾衒外希世取名聲人或譏之曰是儒生斯世而不為斯世是何猶有樸者存也純甫聞而笑曰彼論我實然不誣也乃自號樸存人以質于予曰鄭叟愚者邪人以樸稱已不怒喜而受又以自明何也予曰鄭叟賢乎哉昔者莊周髙世士也人命之牛則諾命之馬亦諾牛與馬皆受不辭而于周之賢未嘗少損吾固知鄭叟賢者也且子謂樸善乎不善乎夫天地之生自太始則有太素素非樸之謂乎是其為生之質物之體事之原也夫禮始于杓枝樂始于土鼓飲食始于汙尊燔黍作服始于衣皮宫室始于構巢書契始于結繩一何其樸邪是時人淳俗野率性而為上下不争四海如一當時不知所事後世無聞其迹迨中古聖人者作然後樹道以興教因質而設文而典禮品秩文物法度生焉文質盖彬彬焉而樸未嘗離也故五帝有雍熈之化三王成大同之治萬世不能加矣自是而降文浮質泯而樸之存益少故夫子有從先進之語林放問禮本則大之子夏聞後素之說棘成有何以文為之歎皆衰世之意也自是而又降則世愈變而道愈微政愈繁而俗愈偷然至于今極矣譎詐以為智婦孺以為仁刼質以取信相下以成禮簡情以為義五常即虛九徳不立人紀大壊求所謂朴盖萬一不存矣顧其攘攘憧憧喬喬詰詰如蜮如鬼如蜴如蛇噫若是尚得謂之人哉今鄭叟誦聖賢之格言慕前修之景行遵先王之大路衣則逢掖冠則章甫業則詩書守先世之田廬安分無求不矯矯以為直不溷溷以為汙不苟苟以為容不皦皦以為明不僥倖而行險不索隱而為怪俗塵不蒙世紛不繳恬淡以樂其生優游以終其餘年吾方愛其朴世顧以為譏邪且夫大羮不調至璞不雕子將以羊質虎皮者之為尚邪將以鞭臈而梔為寳邪是何朴之譏也其人不能對吾請復諸純甫書宋武岡守楊公遺稿後自古及今君子之慮小人不審而尋被其禍者衆矣予復因慶元君子之事而有感焉宋寧宗之立趙忠定公汝愚之力也遣侂胄白意太后不得事因闗禮而决侂胄認以為功而忠定處之觖望忠定亟収海内名士將以興致太平侂胄意不便于其間隂引同惡以傾善類未幾去首相不與廷議事多從中下李沐何人敢為禍首事無可指遂諉以同姓圖不利社稷蓋將一網盡之章潁徐誼吕祖儉諸人皆以救忠定相繼罷斥李祥楊簡又出補外憸人之黨立朝殆遍事亦何可為者而六館諸生乃復有能回天拔山者哉若武岡守楊公宏中時方為太學生與其徒六人上書闕下彼忘其身之微將以一杯水濟一車薪之火夫豈不智不量其力蓋義激於中雖以試刀鋸鼎鑊而不悔可謂難矣當時稱六君子夫豈虛美哉忠定既竄學禁旋興禍如東漢之季馴至開禧天下幾亂嗚呼小人得勢豈徒君子之不幸實有國者之大不幸究論其卒彼亦何利焉至今武夫童子聞侂胄之名哆吻唾罵若楊公之後無賢不肖人見之必曰慶元君子之後莫不加敬是理安可誣哉桞子又論士大夫于天下大故不避禍難憤切言之至於朋友僚屬之際其事不係天下之重而能悉心以規諌者蓋寡非秉志不私而愛人以徳者詎肯然邪觀公與汪察院一書益可徵其平生矣公之五世孫綱出公遺像及公文稿瞻仰之餘敬書卷末噫世有誦公之文覿公之容而不背汗泚顙者亦幾何人哉有内揆不能而外為大言以欺世者公之罪人也祭鄭氏甥女文死生之際人孰不悲我悲獨深欲將告誰汝母吾姊當娠汝時年二十六産汝而斃念汝之生尚安可期既脫襁褓又離孩提視汝長成幸汝有歸壻亦吾甥室家孔宜生女生男吾懐怡怡汝家凋敝汝力扶持道汝艱難我内如刲去載入山我禍洊罹汝逺來唁相對泣垂寛譬百端謂之數畸孰謂汝歸竒疾遽隨豈無盧扁望能治理汝弟汝妹汝姑汝姨環立拱視愛莫能施張目待盡汝情苦而嗚呼人以百歳為不足汝竟如此而止昨日見汝之生今日見汝之死吾哀誠不能置也嗚呼我昔哭姊痛視汝存今日哭汝不忍諸孫汝有神靈相其成立受命不豐庶為後福殯宫孔邇幽坎何期祖奠一觴庶幾享之諸妹哭羅氏姊文人之至親父母兄弟死生疾病皆得相聚何不幸者獨為女子我重不幸自幼而孤我父先徃我母繼殂姊妹四人與兄弟俱同生異長行各一隅惟姊最逺有如越胡間歳來歸能一聚首雖則暫㑹别亦不久姊復多病不利起居不能苦留為我躇蹰握手欲别淚恒至枯將病之原亦由此歟暮春之還姊為我語念病既久恐遂不愈子少未教女幼未筓病未及死焉能置懐干戈猝興人各奔竄及其少定乃得相問姊病已劇伏枕弗興奔走未及訃云姊瞑呼號無天踊頓無地骨肉永絶此生已矣哀哉哀哉昔姊常念欲得與諸妹過從而不可得今諸妹逺來求見姊不可得矣有淚如河不能到泉姊能有知我心則傳清溪之水流怨無已出門一慟夫復何俟祭葉祺文人之始生桑弧蓬矢志在四方曰丈夫子彼窮與達數有偶竒彼短與修命之不齊在已者崇在天者俟惟曰懐居乃士所恥古人有願馬革裹尸首邱屬纊視死何卑子有鎡基有時有勢出門耿耿一笑萬里煌煌京國玉粒桂炊子留兩年不知客羇曳裾王門珠履追隨囊錐脫潁薦牘交馳有志不遂有才不施命不與謀誰能謀之嗚呼嗟嗟大江西流兮粤臺之下江之悠悠兮岸幽幽楊花飛兮送行舟子之行兮萬里望中原兮阻修嗚呼嗟嗟朔風起兮吹黄沙黄沙驚兮亂棘眼雲凭凭兮念子逺春雨深兮烹鯉魚秋鴈來兮重寄書忽乗風以長逝逐飛仙之瓊裾嗚呼嗟嗟可奈何氣填鬱兮淚滂沱悵後期之不復惜徃日兮奈何尊有酒兮豆有核長歌下招兮心結愲耳聽兮語言容貌兮吾前情闕切兮不得宣恨枉深兮不能傳之死則天有志兮吾為爾獨憐祭鄭以宏文嗚呼天乎謂天不言所出者理善人之生為天地紀善人遽亡天一何恃或者謂治世天道昭明世亂天道反覆是固然邪是不然邪賢哉鄭君耿介獨清凛乎操節長松堅冰上師聖賢抱守遺經視黄金不富駟蓋無榮世之何物足以動子直不能與世俛仰隨時重輕則為造物所厄邪賢哉鄭君吾黨之師曩嘗一相見令人愧厲數日今其已矣誰為余益此余所以傷心刺骨蓋與君心交而神契非徒惻惻已噫是果命之然耶世之名一善者近亦往往淪謝自哭君之後復哭二三友矣嗚呼天乎天胡然哉匪言之長以宣我哀祭蘇善卿六丈文人之有生則必有死死顧有為人所幸有為人所惜至于人莫不痛其死則猶不死也嗚呼先生之質之純盎然春和粹然玊温表裡如一誠意肫肫得一善而喜忘食忘寐聞一惡而戒如刃刺鋒鑚讓夷推徳周貧急難生不負死行必踐言孝友子諒愊愊恂恂自其家無間言自三族無間言自鄉黨朋友下至僮僕無間言雖婦女童孺莫不愛敬以至兇頑險狡皆革面而不敢售其奸此豈富足以致其慕勢足以起其畏邪比其歿也聞名而不識面者亦齎咨感歎此又安可得邪海以繾綣之親辱知最厚痛悼之私實逾常品然所論述則不敢過也嗚呼載思往日一話一言談經講道酌酒酬篇青鞋布襪水涯山巔荔隂橙香月下霜前徘徊接武笑語連肩亂離相依廬旅仍年去年冬初君時抱疾我往來慶謂君六秩豈知勉强為我追陪曽歸幾何遽以告萎肝腸傾翻骨肉驚顫傷心欲狂涕淚如霰嗚呼我有疾病君省候之我有患難君赴救之我有不及君教誨之凡我衷曲君盡知之君有所為與我謀之樂為我喜憂為我戚而君之疾我不得視湯藥君之歿我不得視纊息終天之别不待永訣于我私情如何如何蚩蚩横目或得黄耉君即百年何足為壽海也道不侔于時用不符于世貧賤寡陋不足敭發潜徳尚逢白居易為建善人碑象峰之阡出門企只既安且固利其後嗣靈辰永遷輀車載路薄奠一觴瀝此情素哀哉哀哉祭漳州知事史大年文嗚呼君家在蜀而墓于此蓋生于此長于此仕于此沒于此得不為閩人邪方烟塵之蔽空望故都其何許存順則何往不安乗化則何在非寓七十已壽何必百齡青袍足章何必緋紫念君賦性孝慈以友念君與人敬信可久君之居官守法畏咎徒限資格不得盡試晚嬰末疾粤自前歳屏居謝事不出門户每一相見則􅴦然喜及其别也嘗泫然涕謂我知君欲托以死嗚呼君平生居而不怡老而不釋歿而不瞑者我固知之矣君亦自知之果海所能理能承此寄而不負邪聊觀造物者而已吉日辰良爰即幽宅惟茲宅兆既堅既好君手所營君目所覩妣考在上右惟君配萬載之寧君穸于左嗚呼已矣平生相知相愛之情固無間于死生也有酒在尊君監此誠能舉之否祭陳氏女文嗚呼汝生而令而不為男此吾家之薄祐也適人而不與百年生子而不及長育幼失其賴良喪其助亦豈汝家之薄祐邪珠沈玉隕兮桂謝蘭萎芳烈不聞兮光輝掩而汝有知兮無知人之悲兮有涯我之思兮無有窮期鷄心巒墓祭文歳在庚戌冬十有一月壬寅哀子海既葬我妣浯州令府君宜人楊氏我初生母髙氏及弟福寧監稅呉次宗于懐安縣恭順里鷄心巒而奠以告曰嗚呼自吾親之歿二十年而後克葬傷哉貧也負罪忍死生天地間仰惟鞠育之恩顧茲衰病之年昊天罔極其曷云報今宅兆既建言即窀穸千秋萬古永無見期攀戀松楸不勝感愴吾弟次宗以君之賢克繼先緒遭世擾亂遂退不仕年亦何促知命不俟君昔垂絶之時呼兄欲言而不得言者豈非以後囑我邪今葬二母于茲君實從葬我殤子榘亦附于旁天光照臨土燥以剛山川秀妍四時異景君其樂之猶有神靈相其後昆右聞過齋集一編乃先師魯客呉先生之所著也偁懼其久而湮沒不傳遂與同志謀鋟之梓嗚呼惟先生以剛明仁勇之資充聖賢誠正修齊之學不幸生匪其時視當世有不可為者于是卓然長往終身不汙一命然間于閱歴古今感時憤事則寓于文辭以發其趣惟其藴于中也𢎞故其著于外也茂是編之作毋慮百餘篇確確乎言切而理當氣充而筆嚴讀之使人肅容斂氣不肖之心喪匿消沮盖自六經之文不作濓洛載道之言以下而文之有益于世者僅于先生得之是豈世之文人遷客操觚執簡馳騁于詞藻之塲者所可冀哉此讀者必自有以識之矣烏待區區一詞之贅第念曩昔先生與先府君相信彌篤故卒俾偁得受學于先生之門今去先生十有五年而先生不可作矣顧以偁之不肖不能繼承先志而先生之道之聞也再覽遺文涕泗交作歳次辛巳仲秋初吉門人靈武王偁謹識聞過齋集卷八
